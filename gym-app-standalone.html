<title>Stimulus — Muscle Stimulation Tracker</title>
<style>
:root{
  --bg-base:#0A0A0B;
  --bg-surface:#131315;
  --bg-elevated:#1C1C1F;
  --glass:rgba(255,255,255,0.045);
  --border-subtle:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --text-primary:#F5F5F7;
  --text-secondary:#9A9AA0;
  --text-tertiary:#5C5C61;
  --recovery-fresh:#4A90E2;
  --recovery-recovering:#E8A33D;
  --recovery-stimulated:#E24A4A;
  --recovery-inactive:#4A4A4E;
  --radius-card:16px;
  --radius-sheet:24px;
  --radius-pill:999px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg-base);
  color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:96px;
  position:relative;
}
.screen{animation:fadein .25s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* header */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 20px 8px;
}
.topbar h1{font-size:22px;font-weight:650;margin:0;letter-spacing:-0.3px;}
.topbar .sub{font-size:13px;color:var(--text-secondary);margin-top:2px;}
.icon-btn{
  width:36px;height:36px;border-radius:var(--radius-pill);
  background:var(--glass);border:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--text-secondary);
}
.icon-btn:active{transform:scale(0.94);}

/* card */
.card{
  background:linear-gradient(180deg,var(--bg-elevated),var(--bg-surface));
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-card);
  padding:18px;
  margin:12px 20px;
}
.card.glass{background:var(--glass);backdrop-filter:blur(20px);}
.card-title{font-size:13px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}

/* today workout hero card */
.hero-card{
  margin:12px 20px;border-radius:20px;padding:22px;
  background:linear-gradient(145deg,#1a1a1d,#101011);
  border:1px solid var(--border-strong);
  position:relative;overflow:hidden;
}
.hero-eyebrow{font-size:12px;color:var(--text-tertiary);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.hero-title{font-size:26px;font-weight:700;margin:4px 0 2px;letter-spacing:-0.4px;}
.hero-meta{display:flex;gap:14px;margin-top:12px;font-size:13px;color:var(--text-secondary);}
.hero-meta b{color:var(--text-primary);font-weight:600;}
.hero-cta{
  margin-top:18px;width:100%;padding:14px;border-radius:14px;border:none;
  background:var(--text-primary);color:#0A0A0B;font-size:15px;font-weight:650;
  cursor:pointer;letter-spacing:-0.1px;
}
.hero-cta:active{transform:scale(0.98);}
.hero-cta.secondary{background:var(--glass);color:var(--text-primary);border:1px solid var(--border-subtle);}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 20px;}
.stat-tile{
  background:var(--glass);border:1px solid var(--border-subtle);border-radius:14px;
  padding:14px;
}
.stat-tile .n{font-size:22px;font-weight:700;letter-spacing:-0.4px;}
.stat-tile .l{font-size:12px;color:var(--text-secondary);margin-top:2px;}

/* recovery bars */
.rec-row{display:flex;align-items:center;gap:10px;padding:9px 0;}
.rec-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rec-name{font-size:14px;flex:1;color:var(--text-primary);}
.rec-track{width:70px;height:5px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;}
.rec-fill{height:100%;border-radius:99px;transition:width .5s ease;}
.rec-pct{font-size:12px;color:var(--text-secondary);width:34px;text-align:right;}

/* exercise list card */
.ex-item{
  display:flex;align-items:center;gap:12px;
  padding:14px;margin:8px 20px;border-radius:14px;
  background:var(--glass);border:1px solid var(--border-subtle);
  cursor:pointer;
}
.ex-item:active{transform:scale(0.98);}
.ex-item.done{border-color:rgba(74,144,226,0.35);background:rgba(74,144,226,0.06);}
.ex-status{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.ex-status.done{background:var(--recovery-fresh);border-color:var(--recovery-fresh);color:#fff;}
.ex-status.progress{border-color:var(--recovery-recovering);}
.ex-main{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;letter-spacing:-0.1px;}
.ex-name-en{font-size:12px;color:var(--text-tertiary);}
.ex-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.chev{color:var(--text-tertiary);font-size:16px;}

/* muscle badges */
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{
  display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 10px;border-radius:99px;
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-secondary);
}
.badge .dot{width:7px;height:7px;border-radius:50%;}
.dot-primary{background:#E24A4A;}
.dot-secondary{background:#E8A33D;}
.dot-stabilizer{background:#D9C24A;}

/* bottom nav */
.navbar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;padding-bottom:calc(14px + env(safe-area-inset-bottom));
  pointer-events:none;
}
.navbar-inner{
  pointer-events:auto;
  display:flex;gap:2px;background:rgba(20,20,22,0.85);backdrop-filter:blur(24px);
  border:1px solid var(--border-subtle);border-radius:22px;padding:6px;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
}
.nav-btn{
  width:64px;height:52px;border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-tertiary);
  transition:background .2s, color .2s;
}
.nav-btn.active{background:var(--glass);color:var(--text-primary);}
.nav-btn svg{width:20px;height:20px;}
.nav-btn span{font-size:10px;font-weight:600;}

/* sheet / detail screen */
.sheet-header{
  display:flex;align-items:center;justify-content:space-between;padding:18px 20px 4px;
}
.back-btn{font-size:14px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:4px;}
.section-label{font-size:12px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin:20px 20px 8px;}

/* set logging */
.set-row{
  display:grid;grid-template-columns:32px 1fr 1fr 1fr;gap:8px;align-items:center;
  padding:10px 20px;
}
.set-row .n{color:var(--text-tertiary);font-size:13px;font-weight:600;}
.set-input{
  background:var(--glass);border:1px solid var(--border-subtle);border-radius:10px;
  color:var(--text-primary);font-size:15px;padding:10px 8px;text-align:center;width:100%;
  font-weight:600;-moz-appearance:textfield;
}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.set-input:focus{outline:none;border-color:var(--border-strong);}
.set-hint{font-size:10px;color:var(--text-tertiary);text-align:center;margin-top:2px;}
.rpe-row{display:flex;gap:6px;padding:4px 20px 14px;}
.rpe-chip{
  flex:1;text-align:center;padding:9px 0;border-radius:10px;font-size:13px;font-weight:600;
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;
}
.rpe-chip.active{background:var(--text-primary);color:#0A0A0B;border-color:var(--text-primary);}
.add-set-btn{
  margin:8px 20px 4px;padding:12px;border-radius:12px;border:1px dashed var(--border-strong);
  background:transparent;color:var(--text-secondary);text-align:center;font-size:14px;font-weight:600;cursor:pointer;
}
.suggest-banner{
  margin:10px 20px;padding:12px 14px;border-radius:12px;
  background:rgba(232,163,61,0.08);border:1px solid rgba(232,163,61,0.25);
  font-size:13px;color:#E8A33D;display:flex;justify-content:space-between;align-items:center;
}
.info-block{margin:0 20px 12px;font-size:13.5px;color:var(--text-secondary);line-height:1.55;}
.info-block b{color:var(--text-primary);}
.primary-btn{
  margin:16px 20px;padding:15px;border-radius:14px;border:none;width:calc(100% - 40px);
  background:var(--text-primary);color:#0A0A0B;font-size:15px;font-weight:650;cursor:pointer;
}
.primary-btn:disabled{opacity:0.35;}
.ghost-btn{
  margin:8px 20px;padding:13px;border-radius:14px;width:calc(100% - 40px);
  background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);
  font-size:14px;font-weight:600;text-align:center;cursor:pointer;
}

/* summary reward moment */
.summary-hero{text-align:center;padding:36px 30px 10px;}
.summary-hero .check{
  width:64px;height:64px;border-radius:50%;background:rgba(74,144,226,0.12);
  border:1px solid rgba(74,144,226,0.4);display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:28px;color:var(--recovery-fresh);
}
.summary-hero h2{font-size:22px;margin:0 0 4px;letter-spacing:-0.3px;}
.summary-hero p{font-size:13.5px;color:var(--text-secondary);margin:0;}
.stim-item{display:flex;align-items:center;gap:12px;padding:12px 20px;}
.stim-item .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.stim-name{font-size:14.5px;font-weight:600;flex:1;}
.stim-role{font-size:12px;color:var(--text-tertiary);}

/* library */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 20px 14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  flex-shrink:0;padding:8px 14px;border-radius:99px;font-size:13px;font-weight:600;
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;
  white-space:nowrap;
}
.filter-chip.active{background:var(--text-primary);color:#0A0A0B;border-color:var(--text-primary);}

/* empty state */
.empty{text-align:center;padding:60px 30px;color:var(--text-tertiary);}
.empty .e-icon{font-size:34px;margin-bottom:10px;}
.empty p{font-size:14px;line-height:1.5;}

/* settings */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border-subtle);
}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:14.5px;}
.setting-select{
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-primary);
  border-radius:10px;padding:8px 10px;font-size:13px;font-weight:600;
}
.day-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:0 20px 4px;}
.day-cell{
  aspect-ratio:1;border-radius:12px;background:var(--glass);border:1px solid var(--border-subtle);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;
  color:var(--text-secondary);gap:3px;
}
.day-cell b{font-size:13px;color:var(--text-primary);}

.tier-label{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  margin:18px 20px 6px;
}
.tier-label .sq{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.tier-note{font-size:11.5px;color:var(--text-tertiary);font-weight:500;text-transform:none;letter-spacing:0;margin-left:2px;}
.tier-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
  padding:4px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.04em;
  margin-top:6px;
}
.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:var(--bg-elevated);border:1px solid var(--border-strong);
  padding:12px 20px;border-radius:14px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity .3s, transform .3s;
  pointer-events:none;max-width:80%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>
<body>
<div id="app"></div>
<div class="navbar"><div class="navbar-inner" id="navbar"></div></div>
<div class="toast" id="toast"></div>

<script>

  split: DEFAULT_SPLIT,

// Lưu bằng localStorage: dữ liệu ở lại vĩnh viễn trên chính trình duyệt/máy đang mở file,
// không đồng bộ qua máy khác — đúng như mong muốn "mỗi máy dữ liệu riêng".
async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    }
  }catch(e){ /* no data yet — use defaults */ }

  // Ép cập nhật lịch tập chuẩn mới nếu dữ liệu cũ chưa khớp phiên bản lịch hiện tại.
  // Lịch sử buổi tập (sessions) vẫn được giữ nguyên — chỉ reset split hiện hành.
  if(state.scheduleVersion !== SCHEDULE_VERSION){
    state.split = DEFAULT_SPLIT;
    state.scheduleVersion = SCHEDULE_VERSION;
    if(state.activeSession && !DAY_TEMPLATES.includes(state.activeSession.dayLabel)){
      state.activeSession = null; // buổi tập đang dở theo lịch cũ không còn khớp cấu trúc mới
    }
    await saveState();
  }
}
async function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('save failed', e); showToast('Không thể lưu dữ liệu trên máy này'); }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ HELPERS ============ */
function todayKey(){ return DAY_KEYS[new Date().getDay()]; }
function todayTemplate(){ return state.split[todayKey()] || 'Rest'; }
function exercisesForDay(dayTemplate){ return EXERCISES.filter(e=> Array.isArray(e.day) ? e.day.includes(dayTemplate) : e.day===dayTemplate); }
function findExercise(id){ return EXERCISES.find(e=>e.id===id); }
function findMuscle(id){ return MUSCLES.find(m=>m.id===id); }
function estimateMinutes(dayTemplate){
  const exs = exercisesForDay(dayTemplate);
  const secs = exs.reduce((sum,e)=> sum + e.sets*(e.rest+40), 0);
  return Math.round(secs/60);
}
function parseRepRange(reps){
  const m = reps.match(/(\d+)-(\d+)/);
  if(m) return [parseInt(m[1]), parseInt(m[2])];
  return [null,null];
}

/* --- streak --- */
function computeStreak(){
  const dates = new Set(state.sessions.map(s=> new Date(s.endedAt).toDateString()));
  let streak=0; let d = new Date();
  // if no session today yet, still count backwards from yesterday
  if(!dates.has(d.toDateString())) d.setDate(d.getDate()-1);
  while(dates.has(d.toDateString())){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

/* --- recovery engine ---
   for each muscle: find most recent session touching it, compute volume_score & avg rpe,
   derive recovery_hours_needed, then recovery_percent from time elapsed. */
function roleWeight(role){ return role==='primary'?1:role==='secondary'?0.5:0.25; }

function muscleTouchesInSession(session, muscleId){
  // returns list of {role, weight(kg), reps, rpe} for sets in session touching this muscle
  const out = [];
  session.sets.forEach(set=>{
    const ex = findExercise(set.exerciseId);
    if(!ex) return;
    let role = null;
    if(ex.primary===muscleId) role='primary';
    else if(ex.secondary.includes(muscleId)) role='secondary';
    else if(ex.stabilizer.includes(muscleId)) role='stabilizer';
    if(role) out.push({role, rpe:set.rpe||7});
  });
  return out;
}

function getMuscleRecovery(muscleId){
  // find most recent session (finished) touching this muscle
  let latest=null, latestTouches=null;
  for(const s of state.sessions){
    const touches = muscleTouchesInSession(s, muscleId);
    if(touches.length>0){
      if(!latest || new Date(s.endedAt) > new Date(latest.endedAt)){ latest=s; latestTouches=touches; }
    }
  }
  if(!latest) return {status:'inactive', percent:100, etaHours:0, lastAt:null};

  const volumeScore = latestTouches.reduce((sum,t)=> sum + roleWeight(t.role), 0);
  const avgRpe = latestTouches.reduce((sum,t)=> sum + t.rpe, 0) / latestTouches.length;
  const baselineSets = 8;
  const volumeMultiplier = Math.min(1.5, Math.max(0.7, volumeScore / baselineSets));
  const rpeMultiplier = Math.min(1.3, Math.max(0.7, 0.8 + (avgRpe-6)*0.1));
  const baseHours = BASE_RECOVERY_HOURS[muscleId] || 48;
  const hoursNeeded = baseHours * volumeMultiplier * rpeMultiplier;

  const lastAt = new Date(latest.endedAt);
  const hoursElapsed = (Date.now() - lastAt.getTime()) / 3600000;
  const percent = Math.min(100, Math.max(0, Math.round((hoursElapsed/hoursNeeded)*100)));
  const isToday = lastAt.toDateString() === new Date().toDateString();
  const daysElapsed = hoursElapsed/24;

  let status;
  if(isToday) status='stimulated';
  else if(percent<100) status='recovering';
  else if(daysElapsed<=7) status='fresh';
  else status='inactive';

  return {status, percent, etaHours: Math.max(0, Math.round(hoursNeeded-hoursElapsed)), lastAt};
}
function recoveryColor(status){
  return {stimulated:'var(--recovery-stimulated)', recovering:'var(--recovery-recovering)', fresh:'var(--recovery-fresh)', inactive:'var(--recovery-inactive)'}[status];
}
function recoveryLabel(status){
  return {stimulated:'Vừa tập hôm nay', recovering:'Đang hồi phục', fresh:'Đã hồi phục', inactive:'Chưa tập gần đây'}[status];
}

/* --- progressive overload suggestion --- */
function getSuggestion(exerciseId){
  const ex = findExercise(exerciseId);
  const past = state.sessions
    .filter(s=> s.sets.some(set=>set.exerciseId===exerciseId))
    .sort((a,b)=> new Date(b.endedAt)-new Date(a.endedAt));
  if(past.length===0) return {previousWeight:null, suggestedWeight:null, note:'Chưa có dữ liệu — bắt đầu với mức tạ bạn cảm thấy kiểm soát tốt ở đúng số rep mục tiêu.'};

  const lastSets = past[0].sets.filter(s=>s.exerciseId===exerciseId);
  const lastWeight = Math.max(...lastSets.map(s=>s.weight||0));
  const [repMin, repMax] = parseRepRange(ex.reps);
  const hitTop = repMax && lastSets.every(s => (s.reps||0) >= repMax);
  const failedMin = repMin && lastSets.some(s => (s.reps||0) < repMin);
  const avgRpe = lastSets.reduce((sum,s)=>sum+(s.rpe||7),0)/lastSets.length;
  const step = ex.compound ? 2.5 : 1.25;

  let suggested = lastWeight, note = '';
  if(failedMin){
    suggested = lastWeight;
    note = `Buổi trước chưa đạt ${repMin} reps ở mọi set — giữ nguyên ${lastWeight}kg, tập trung hoàn thành đủ reps trước.`;
  } else if(hitTop && avgRpe<=8){
    suggested = lastWeight + step;
    note = `Buổi trước đạt trọn ${ex.reps} reps với RPE ổn — tăng lên ${suggested}kg lần này.`;
  } else if(hitTop && avgRpe>8){
    suggested = lastWeight;
    note = `Đạt reps mục tiêu nhưng RPE cao (~${avgRpe.toFixed(1)}) — giữ ${lastWeight}kg, ưu tiên làm chủ trước khi tăng.`;
  } else {
    suggested = lastWeight;
    note = `Giữ nguyên ${lastWeight}kg, mục tiêu buổi này là chạm mốc ${repMax||''} reps ở mọi set.`;
  }
  return {previousWeight:lastWeight, suggestedWeight:suggested, note};
}

/* ============ RENDER: TODAY ============ */
function renderToday(){
  const dayTemplate = state.activeSession ? state.activeSession.dayLabel : todayTemplate();
  const exs = exercisesForDay(dayTemplate);
  const isRest = dayTemplate==='Rest';

  if(isRest && !state.activeSession){
    return `<div class="screen">
      <div class="topbar"><div><h1>Hôm nay</h1><div class="sub">Ngày nghỉ</div></div></div>
      <div class="empty"><div class="e-icon">🌙</div><p>Hôm nay là ngày nghỉ theo lịch tập của bạn.<br>Cơ bắp đang hồi phục để phát triển.</p></div>
    </div>`;
  }

  const setsLogged = state.activeSession ? state.activeSession.sets : [];
  const exStatus = (ex)=>{
    const logged = setsLogged.filter(s=>s.exerciseId===ex.id).length;
    if(logged===0) return 'notstarted';
    if(logged>=ex.sets) return 'done';
    return 'progress';
  };
  const allDone = exs.length>0 && exs.every(ex=>exStatus(ex)==='done');

  return `<div class="screen">
    <div class="topbar">
      <div><h1>${dayTemplate}</h1><div class="sub">${exs.length} bài tập · ~${estimateMinutes(dayTemplate)} phút</div></div>
    </div>
    ${!state.activeSession? `<div style="margin:0 20px 4px;"><button class="hero-cta" onclick="startSession('${dayTemplate}')">Bắt đầu buổi tập</button></div>`:''}
    ${TIER_ORDER.map(tier=>{
      const group = exs.filter(ex=> (ex.tier||'main')===tier);
      if(group.length===0) return '';
      const t = TIER_INFO[tier];
      return `<div class="tier-label" style="color:${t.color}"><div class="sq" style="background:${t.color}"></div>${t.emoji} ${t.label}</div>
      ${group.map(ex=>{
        const st = state.activeSession ? exStatus(ex) : 'notstarted';
        return `<div class="ex-item ${st==='done'?'done':''}" onclick="${state.activeSession? `goTo('exercise',{id:'${ex.id}'})` : `showToast('Bắt đầu buổi tập trước để log bài tập')`}">
          <div class="ex-status ${st}">${st==='done'? ICONS.check : ''}</div>
          <div class="ex-main">
            <div class="ex-name">${ex.vi}</div>
            <div class="ex-name-en">${ex.en}</div>
            <div class="ex-meta">${ex.sets} set × ${ex.reps} reps · nghỉ ${ex.rest}s</div>
          </div>
          <div class="chev">${ICONS.chev}</div>
        </div>`;
      }).join('')}`;
    }).join('')}
    ${state.activeSession? `<div style="margin-top:8px;"><button class="primary-btn" ${!allDone?'':''} onclick="finishSession()">Kết thúc buổi tập</button></div>`:''}
  </div>`;
}

function startSession(dayTemplate){
  state.activeSession = {dayLabel:dayTemplate, startedAt:new Date().toISOString(), sets:[]};
  saveState();
  render();
}

/* ============ RENDER: EXERCISE DETAIL ============ */
let draftSet = {weight:null, reps:null, rpe:7};

function renderExercise(exId){
  const ex = findExercise(exId);
  if(!ex) return `<div class="screen"><div class="empty">Không tìm thấy bài tập.</div></div>`;
  const loggedSets = state.activeSession ? state.activeSession.sets.filter(s=>s.exerciseId===exId) : [];
  const suggestion = getSuggestion(exId);
  const [repMin,repMax] = parseRepRange(ex.reps);

  const muscleBadges = [
    {role:'primary', id:ex.primary},
    ...ex.secondary.map(id=>({role:'secondary', id})),
    ...ex.stabilizer.map(id=>({role:'stabilizer', id})),
  ];

  return `<div class="screen">
    <div class="sheet-header">
      <div class="back-btn" onclick="goTo('today')">${ICONS.back} Hôm nay</div>
    </div>
    <div style="padding:4px 20px;">
      <div style="font-size:22px;font-weight:700;letter-spacing:-0.3px;">${ex.vi}</div>
      <div style="font-size:13px;color:var(--text-tertiary);margin-top:2px;">${ex.en} · ${ex.equipment}</div>
      <div class="tier-badge" style="background:${TIER_INFO[ex.tier||'main'].color}22;color:${TIER_INFO[ex.tier||'main'].color};">${TIER_INFO[ex.tier||'main'].emoji} ${TIER_INFO[ex.tier||'main'].label}</div>
      <div class="badge-row">
        ${muscleBadges.map(b=>`<div class="badge"><div class="dot dot-${b.role}"></div>${findMuscle(b.id).vi}</div>`).join('')}
      </div>
    </div>

    <div class="suggest-banner">
      <span>${suggestion.previousWeight? `Buổi trước: <b>${suggestion.previousWeight}kg</b>` : 'Chưa có lịch sử'}</span>
      ${suggestion.suggestedWeight? `<span>Gợi ý: <b>${suggestion.suggestedWeight}kg</b></span>`:''}
    </div>
    <div class="info-block" style="margin-top:-4px;">${suggestion.note}</div>

    <div class="section-label">Ghi log — mục tiêu ${ex.sets} set × ${ex.reps}</div>
    ${loggedSets.map((s,i)=>`
      <div class="set-row">
        <div class="n">#${i+1}</div>
        <div><div class="set-input" style="opacity:0.6;">${s.weight}</div><div class="set-hint">kg</div></div>
        <div><div class="set-input" style="opacity:0.6;">${s.reps}</div><div class="set-hint">reps</div></div>
        <div><div class="set-input" style="opacity:0.6;">${s.rpe}</div><div class="set-hint">RPE</div></div>
      </div>`).join('')}

    ${loggedSets.length < ex.sets ? `
      <div class="set-row">
        <div class="n">#${loggedSets.length+1}</div>
        <div><input class="set-input" id="draftWeight" type="number" inputmode="decimal" placeholder="${suggestion.suggestedWeight||''}" value="${draftSet.weight??''}"><div class="set-hint">kg</div></div>
        <div><input class="set-input" id="draftReps" type="number" inputmode="numeric" placeholder="${repMax||''}" value="${draftSet.reps??''}"><div class="set-hint">reps</div></div>
        <div><div class="set-input" id="draftRpeDisplay" style="pointer-events:none;">${draftSet.rpe}</div><div class="set-hint">RPE</div></div>
      </div>
      <div class="rpe-row">
        ${[6,7,8,9,10].map(v=>`<div class="rpe-chip ${draftSet.rpe===v?'active':''}" onclick="setRpe(${v})">${v}</div>`).join('')}
      </div>
      <div class="add-set-btn" onclick="logSet('${exId}', ${ex.sets})">+ Lưu set này</div>
    ` : `<div class="info-block" style="text-align:center;color:var(--recovery-fresh);">✓ Đã hoàn thành đủ set cho bài này.</div>`}

    <div class="section-label">Chuẩn bị (Setup)</div>
    <div class="info-block">${ex.setup}</div>

    <div class="section-label">Kỹ thuật</div>
    <div class="info-block"><b>Tempo:</b> ${ex.tempo} · <b>RPE/RIR mục tiêu:</b> ${ex.rpe}</div>
    <div class="info-block"><b>Cue:</b> ${ex.cue}</div>
    <div class="info-block"><b>Lỗi thường gặp:</b> ${ex.mistakes}</div>
    <div class="info-block"><b>Tips:</b> ${ex.tips}</div>
    <div class="info-block"><b>Bài thay thế (nếu máy bận/không có thiết bị):</b><br>${ex.alt.map((a,i)=>`${i+1}. ${a}`).join('<br>')}</div>
    <div class="info-block" style="color:var(--text-tertiary);font-size:12px;">Video/GIF minh họa sẽ được bổ sung ở bản cập nhật kế tiếp.</div>

    <button class="ghost-btn" onclick="goTo('today')">Xong, quay lại danh sách</button>
  </div>`;
}
function setRpe(v){ draftSet.rpe=v; render(); }
function logSet(exId, targetSets){
  const w = parseFloat(document.getElementById('draftWeight').value);
  const r = parseInt(document.getElementById('draftReps').value);
  if(isNaN(w) || isNaN(r)){ showToast('Nhập đầy đủ mức tạ và số reps'); return; }
  state.activeSession.sets.push({exerciseId:exId, weight:w, reps:r, rpe:draftSet.rpe, completedAt:new Date().toISOString()});
  draftSet = {weight:null, reps:null, rpe:7};
  saveState();
  render();
  showToast('Đã lưu set 💪');
}

/* ============ FINISH SESSION -> SUMMARY ============ */
function finishSession(){
  if(!state.activeSession || state.activeSession.sets.length===0){ showToast('Hãy log ít nhất 1 set trước khi kết thúc'); return; }
  const session = Object.assign({}, state.activeSession, {id:'s_'+Date.now(), endedAt:new Date().toISOString()});
  state.sessions.push(session);
  state.activeSession = null;
  saveState();
  goTo('summary', {sessionId:session.id});
}

function renderSummary(sessionId){
  const session = state.sessions.find(s=>s.id===sessionId) || state.sessions[state.sessions.length-1];
  if(!session) return `<div class="screen"><div class="empty">Không có dữ liệu buổi tập.</div></div>`;

  const muscleRoles = {}; // muscleId -> best role
  session.sets.forEach(set=>{
    const ex = findExercise(set.exerciseId);
    if(!ex) return;
    const assign = (id,role)=>{
      const rank = {primary:3,secondary:2,stabilizer:1};
      if(!muscleRoles[id] || rank[role]>rank[muscleRoles[id]]) muscleRoles[id]=role;
    };
    assign(ex.primary,'primary');
    ex.secondary.forEach(id=>assign(id,'secondary'));
    ex.stabilizer.forEach(id=>assign(id,'stabilizer'));
  });
  const sorted = Object.entries(muscleRoles).sort((a,b)=>{
    const rank = {primary:3,secondary:2,stabilizer:1};
    return rank[b[1]]-rank[a[1]];
  });
  const totalVolume = session.sets.reduce((sum,s)=> sum + (s.weight*s.reps||0), 0);
  const durationMin = Math.round((new Date(session.endedAt)-new Date(session.startedAt))/60000);
  const roleColor = {primary:'#E24A4A', secondary:'#E8A33D', stabilizer:'#D9C24A'};
  const roleLabel = {primary:'Primary', secondary:'Secondary', stabilizer:'Stabilizer'};

  return `<div class="screen">
    <div class="summary-hero">
      <div class="check">${ICONS.check}</div>
      <h2>Buổi tập hoàn thành</h2>
      <p>${session.dayLabel} · ${durationMin} phút · ${session.sets.length} set</p>
    </div>
    <div class="stat-grid">
      <div class="stat-tile"><div class="n">${Math.round(totalVolume)}kg</div><div class="l">Tổng volume</div></div>
      <div class="stat-tile"><div class="n">${sorted.length}</div><div class="l">Nhóm cơ được kích thích</div></div>
    </div>
    <div class="section-label">Muscle Stimulation</div>
    ${sorted.map(([id,role])=>`
      <div class="stim-item">
        <div class="dot" style="background:${roleColor[role]}"></div>
        <div class="stim-name">${findMuscle(id).vi}</div>
        <div class="stim-role">${roleLabel[role]}</div>
      </div>`).join('')}
    <button class="primary-btn" onclick="goTo('home')">Về trang chủ</button>
  </div>`;
}

/* ============ RENDER: LIBRARY ============ */
let libraryFilter = 'all';
function renderLibrary(){
  const filters = [{id:'all',label:'Tất cả'}, ...[...MUSCLES].sort((a,b)=>a.priority-b.priority).map(m=>({id:m.id,label:m.vi}))];
  const list = libraryFilter==='all' ? EXERCISES : EXERCISES.filter(e=> e.primary===libraryFilter || e.secondary.includes(libraryFilter) || e.stabilizer.includes(libraryFilter));

  return `<div class="screen">
    <div class="topbar"><div><h1>Thư viện bài tập</h1><div class="sub">${EXERCISES.length} bài tập</div></div></div>
    <div class="filter-row">
      ${filters.map(f=>`<div class="filter-chip ${libraryFilter===f.id?'active':''}" onclick="setLibraryFilter('${f.id}')">${f.label}</div>`).join('')}
    </div>
    ${list.map(ex=>`
      <div class="ex-item" onclick="goTo('exerciseInfo',{id:'${ex.id}'})">
        <div class="ex-main">
          <div class="ex-name">${ex.vi}</div>
          <div class="ex-name-en">${ex.en} · ${Array.isArray(ex.day)?ex.day.join(' & '):ex.day}</div>
          <div class="ex-meta">${TIER_INFO[ex.tier||'main'].emoji} ${TIER_INFO[ex.tier||'main'].label} · ${ex.sets} set × ${ex.reps}</div>
        </div>
        <div class="chev">${ICONS.chev}</div>
      </div>`).join('')}
  </div>`;
}
function setLibraryFilter(id){ libraryFilter=id; render(); }

function renderExerciseInfo(exId){
  const ex = findExercise(exId);
  const muscleBadges = [{role:'primary', id:ex.primary}, ...ex.secondary.map(id=>({role:'secondary', id})), ...ex.stabilizer.map(id=>({role:'stabilizer', id}))];
  const dayLabel = Array.isArray(ex.day) ? ex.day.join(' & ') : ex.day;
  return `<div class="screen">
    <div class="sheet-header"><div class="back-btn" onclick="goTo('library')">${ICONS.back} Thư viện</div></div>
    <div style="padding:4px 20px;">
      <div style="font-size:22px;font-weight:700;letter-spacing:-0.3px;">${ex.vi}</div>
      <div style="font-size:13px;color:var(--text-tertiary);margin-top:2px;">${ex.en} · ${ex.equipment} · ${dayLabel}</div>
      <div class="tier-badge" style="background:${TIER_INFO[ex.tier||'main'].color}22;color:${TIER_INFO[ex.tier||'main'].color};">${TIER_INFO[ex.tier||'main'].emoji} ${TIER_INFO[ex.tier||'main'].label}</div>
      <div class="badge-row">${muscleBadges.map(b=>`<div class="badge"><div class="dot dot-${b.role}"></div>${findMuscle(b.id).vi}</div>`).join('')}</div>
    </div>
    <div class="section-label">Thông số</div>
    <div class="info-block"><b>Sets/Reps:</b> ${ex.sets} × ${ex.reps} · <b>Nghỉ:</b> ${ex.rest}s</div>
    <div class="info-block"><b>Tempo:</b> ${ex.tempo} · <b>RPE/RIR mục tiêu:</b> ${ex.rpe}</div>
    <div class="section-label">Chuẩn bị (Setup)</div>
    <div class="info-block">${ex.setup}</div>
    <div class="section-label">Kỹ thuật</div>
    <div class="info-block"><b>Cue:</b> ${ex.cue}</div>
    <div class="info-block"><b>Lỗi thường gặp:</b> ${ex.mistakes}</div>
    <div class="info-block"><b>Tips:</b> ${ex.tips}</div>
    <div class="info-block"><b>Bài thay thế (nếu máy bận/không có thiết bị):</b><br>${ex.alt.map((a,i)=>`${i+1}. ${a}`).join('<br>')}</div>
    <div class="info-block" style="color:var(--text-tertiary);font-size:12px;">Video/GIF minh họa sẽ được bổ sung ở bản cập nhật kế tiếp.</div>
  </div>`;
}

/* ============ RENDER: RECOVERY ============ */
function renderRecovery(){
  const sorted = [...MUSCLES].sort((a,b)=>a.priority-b.priority);
  return `<div class="screen">
    <div class="topbar"><div><h1>Hồi phục</h1><div class="sub">Trạng thái từng nhóm cơ</div></div></div>
    <div class="card">
      ${sorted.map(m=>{
        const r = getMuscleRecovery(m.id);
        return `<div class="rec-row" style="padding:12px 0;">
          <div class="rec-dot" style="background:${recoveryColor(r.status)}"></div>
          <div style="flex:1;">
            <div class="rec-name">${m.vi}</div>
            <div style="font-size:11.5px;color:var(--text-tertiary);margin-top:1px;">${recoveryLabel(r.status)}${r.status==='recovering'? ` · còn ~${r.etaHours}h`:''}</div>
          </div>
          <div class="rec-track"><div class="rec-fill" style="width:${r.percent}%;background:${recoveryColor(r.status)}"></div></div>
          <div class="rec-pct">${r.percent}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="card glass">
      <div class="card-title">Chú giải màu</div>
      <div class="rec-row"><div class="rec-dot" style="background:var(--recovery-stimulated)"></div><div class="rec-name">Vừa tập hôm nay</div></div>
      <div class="rec-row"><div class="rec-dot" style="background:var(--recovery-recovering)"></div><div class="rec-name">Đang hồi phục</div></div>
      <div class="rec-row"><div class="rec-dot" style="background:var(--recovery-fresh)"></div><div class="rec-name">Đã hồi phục (trong 7 ngày)</div></div>
      <div class="rec-row"><div class="rec-dot" style="background:var(--recovery-inactive)"></div><div class="rec-name">Chưa tập gần đây (&gt;7 ngày)</div></div>
    </div>
  </div>`;
}

/* ============ RENDER: SETTINGS ============ */
function renderSettings(){
  return `<div class="screen">
    <div class="topbar"><div><h1>Cài đặt</h1><div class="sub">Lịch tập & thông tin</div></div></div>
    <div class="section-label">Hồ sơ cá nhân</div>
    <div class="card">
      <div class="info-block" style="margin:0 0 6px;"><b>Tên:</b> ${state.profile? state.profile.name : '—'}</div>
      <div class="info-block" style="margin:0 0 6px;"><b>Tuổi:</b> ${state.profile? state.profile.age : '—'}</div>
      <div class="info-block" style="margin:0;"><b>Chiều cao:</b> ${state.profile? state.profile.height+'cm' : '—'}</div>
      <div class="ghost-btn" style="margin:12px 0 0;" onclick="editProfile()">Sửa hồ sơ</div>
    </div>

    <div class="section-label">Lịch tập theo tuần (Split) — Chuẩn cố định</div>
    <div class="info-block" style="margin:0 20px 6px;">Đây là lịch tập chuẩn của bạn. Chỉ có 6 loại buổi tập này trong hệ thống — không có PPL, Arnold Split hay biến thể khác.</div>
    <div class="card">
      ${DAY_KEYS.filter(k=>k!=='').map(()=>'').join('')}
      ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day=>`
        <div class="setting-row">
          <div class="setting-label">${DAY_LABEL_VI[day]} · ${day}</div>
          <select class="setting-select" onchange="setSplitDay('${day}', this.value)">
            ${DAY_TEMPLATES.map(t=>`<option value="${t}" ${state.split[day]===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>`).join('')}
    </div>

    <div class="section-label">Số đo cơ thể (cập nhật hàng tuần)</div>
    <div class="card">
      <div class="set-row" style="grid-template-columns:1fr 1fr;padding:0 0 10px;">
        <div><input class="set-input" id="mWeight" type="number" placeholder="65"><div class="set-hint">Cân nặng (kg)</div></div>
        <div><input class="set-input" id="mChest" type="number" placeholder="90"><div class="set-hint">Vòng ngực (cm)</div></div>
      </div>
      <div class="add-set-btn" onclick="addMeasurement()">+ Lưu số đo tuần này</div>
      ${state.measurements.length? `<div class="info-block">Gần nhất: ${state.measurements[state.measurements.length-1].weight}kg, ngực ${state.measurements[state.measurements.length-1].chest||'—'}cm</div>`:''}
    </div>

    <div class="section-label">Dữ liệu</div>
    <div class="card">
      <div class="info-block" style="margin:0;">Tổng số buổi tập đã hoàn thành: <b>${state.sessions.length}</b></div>
      <div class="ghost-btn" style="margin:12px 0 0;color:var(--recovery-stimulated);" onclick="resetAllData()">Xoá toàn bộ dữ liệu</div>
    </div>
  </div>`;
}
function setSplitDay(day, template){ state.split[day]=template; saveState(); showToast('Đã lưu lịch tập'); }
function addMeasurement(){
  const w = parseFloat(document.getElementById('mWeight').value);
  const c = parseFloat(document.getElementById('mChest').value);
  if(isNaN(w)){ showToast('Nhập cân nặng'); return; }
  state.measurements.push({date:new Date().toISOString(), weight:w, chest:isNaN(c)?null:c});
  saveState(); render(); showToast('Đã lưu số đo');
}
function resetAllData(){
  if(!confirm('Xoá toàn bộ dữ liệu tập luyện? Không thể hoàn tác.')) return;
  state = {profile:state.profile, split:DEFAULT_SPLIT, sessions:[], activeSession:null, measurements:[], settings:{unit:'kg'}};
  saveState(); goTo('home');
}

/* ============ MAIN RENDER ============ */
function render(){
  const el = document.getElementById('app');
  if(!state.profile){
    document.getElementById('navbar').innerHTML = '';
    el.innerHTML = renderOnboarding();
    return;
  }
  renderNavbar();
  if(view.name==='home') el.innerHTML = renderHome();
  else if(view.name==='today') el.innerHTML = renderToday();
  else if(view.name==='exercise') el.innerHTML = renderExercise(view.params.id);
  else if(view.name==='exerciseInfo') el.innerHTML = renderExerciseInfo(view.params.id);
  else if(view.name==='summary') el.innerHTML = renderSummary(view.params.sessionId);
  else if(view.name==='library') el.innerHTML = renderLibrary();
  else if(view.name==='recovery') el.innerHTML = renderRecovery();
  else if(view.name==='settings') el.innerHTML = renderSettings();
}

/* ============ INIT ============ */
(async function init(){
  await loadState();
  render();
})();
</script>
</body>
