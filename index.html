<title>Stimulus — Muscle Stimulation Tracker</title>
<style>
:root{
  --bg-base:#0A0A0B;
  --bg-surface:#131315;
  --bg-elevated:#1C1C1F;
  --glass:rgba(255,255,255,0.045);
  --border-subtle:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.14);
  --text-primary:#F5F5F7;
  --text-secondary:#9A9AA0;
  --text-tertiary:#5C5C61;
  --recovery-fresh:#4A90E2;
  --recovery-recovering:#E8A33D;
  --recovery-stimulated:#E24A4A;
  --recovery-inactive:#4A4A4E;
  --radius-card:16px;
  --radius-sheet:24px;
  --radius-pill:999px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg-base);
  color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:96px;
  position:relative;
}
.screen{animation:fadein .25s ease-out;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* header */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 20px 8px;
}
.topbar h1{font-size:22px;font-weight:650;margin:0;letter-spacing:-0.3px;}
.topbar .sub{font-size:13px;color:var(--text-secondary);margin-top:2px;}
.icon-btn{
  width:36px;height:36px;border-radius:var(--radius-pill);
  background:var(--glass);border:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--text-secondary);
}
.icon-btn:active{transform:scale(0.94);}

/* card */
.card{
  background:linear-gradient(180deg,var(--bg-elevated),var(--bg-surface));
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-card);
  padding:18px;
  margin:12px 20px;
}
.card.glass{background:var(--glass);backdrop-filter:blur(20px);}
.card-title{font-size:13px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}

/* today workout hero card */
.hero-card{
  margin:12px 20px;border-radius:20px;padding:22px;
  background:linear-gradient(145deg,#1a1a1d,#101011);
  border:1px solid var(--border-strong);
  position:relative;overflow:hidden;
}
.hero-eyebrow{font-size:12px;color:var(--text-tertiary);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.hero-title{font-size:26px;font-weight:700;margin:4px 0 2px;letter-spacing:-0.4px;}
.hero-meta{display:flex;gap:14px;margin-top:12px;font-size:13px;color:var(--text-secondary);}
.hero-meta b{color:var(--text-primary);font-weight:600;}
.hero-cta{
  margin-top:18px;width:100%;padding:14px;border-radius:14px;border:none;
  background:var(--text-primary);color:#0A0A0B;font-size:15px;font-weight:650;
  cursor:pointer;letter-spacing:-0.1px;
}
.hero-cta:active{transform:scale(0.98);}
.hero-cta.secondary{background:var(--glass);color:var(--text-primary);border:1px solid var(--border-subtle);}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 20px;}
.stat-tile{
  background:var(--glass);border:1px solid var(--border-subtle);border-radius:14px;
  padding:14px;
}
.stat-tile .n{font-size:22px;font-weight:700;letter-spacing:-0.4px;}
.stat-tile .l{font-size:12px;color:var(--text-secondary);margin-top:2px;}

/* recovery bars */
.rec-row{display:flex;align-items:center;gap:10px;padding:9px 0;}
.rec-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rec-name{font-size:14px;flex:1;color:var(--text-primary);}
.rec-track{width:70px;height:5px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;}
.rec-fill{height:100%;border-radius:99px;transition:width .5s ease;}
.rec-pct{font-size:12px;color:var(--text-secondary);width:34px;text-align:right;}

/* exercise list card */
.ex-item{
  display:flex;align-items:center;gap:12px;
  padding:14px;margin:8px 20px;border-radius:14px;
  background:var(--glass);border:1px solid var(--border-subtle);
  cursor:pointer;
}
.ex-item:active{transform:scale(0.98);}
.ex-item.done{border-color:rgba(74,144,226,0.35);background:rgba(74,144,226,0.06);}
.ex-status{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.ex-status.done{background:var(--recovery-fresh);border-color:var(--recovery-fresh);color:#fff;}
.ex-status.progress{border-color:var(--recovery-recovering);}
.ex-main{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;letter-spacing:-0.1px;}
.ex-name-en{font-size:12px;color:var(--text-tertiary);}
.ex-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.chev{color:var(--text-tertiary);font-size:16px;}

/* muscle badges */
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.badge{
  display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 10px;border-radius:99px;
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-secondary);
}
.badge .dot{width:7px;height:7px;border-radius:50%;}
.dot-primary{background:#E24A4A;}
.dot-secondary{background:#E8A33D;}
.dot-stabilizer{background:#D9C24A;}

/* bottom nav */
.navbar{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;padding-bottom:calc(14px + env(safe-area-inset-bottom));
  pointer-events:none;
}
.navbar-inner{
  pointer-events:auto;
  display:flex;gap:2px;background:rgba(20,20,22,0.85);backdrop-filter:blur(24px);
  border:1px solid var(--border-subtle);border-radius:22px;padding:6px;
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
  max-width:calc(100vw - 24px);overflow-x:auto;scrollbar-width:none;
}
.navbar-inner::-webkit-scrollbar{display:none;}
.nav-btn{
  width:58px;height:52px;border-radius:16px;display:flex;flex-direction:column;flex-shrink:0;
  align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text-tertiary);
  transition:background .2s, color .2s;
}
.nav-btn.active{background:var(--glass);color:var(--text-primary);}
.nav-btn svg{width:19px;height:19px;}
.nav-btn span{font-size:9.5px;font-weight:600;}

/* sheet / detail screen */
.sheet-header{
  display:flex;align-items:center;justify-content:space-between;padding:18px 20px 4px;
}
.back-btn{font-size:14px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:4px;}
.section-label{font-size:12px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin:20px 20px 8px;}

/* set logging */
.set-row{
  display:grid;grid-template-columns:32px 1fr 1fr 1fr;gap:8px;align-items:center;
  padding:10px 20px;
}
.set-row .n{color:var(--text-tertiary);font-size:13px;font-weight:600;}
.set-input{
  background:var(--glass);border:1px solid var(--border-subtle);border-radius:10px;
  color:var(--text-primary);font-size:15px;padding:10px 8px;text-align:center;width:100%;
  font-weight:600;-moz-appearance:textfield;
}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.set-input:focus{outline:none;border-color:var(--border-strong);}
.set-hint{font-size:10px;color:var(--text-tertiary);text-align:center;margin-top:2px;}
.rpe-row{display:flex;gap:6px;padding:4px 20px 14px;}
.rpe-chip{
  flex:1;text-align:center;padding:9px 0;border-radius:10px;font-size:13px;font-weight:600;
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;
}
.rpe-chip.active{background:var(--text-primary);color:#0A0A0B;border-color:var(--text-primary);}
.add-set-btn{
  margin:8px 20px 4px;padding:12px;border-radius:12px;border:1px dashed var(--border-strong);
  background:transparent;color:var(--text-secondary);text-align:center;font-size:14px;font-weight:600;cursor:pointer;
}
.suggest-banner{
  margin:10px 20px;padding:12px 14px;border-radius:12px;
  background:rgba(232,163,61,0.08);border:1px solid rgba(232,163,61,0.25);
  font-size:13px;color:#E8A33D;display:flex;justify-content:space-between;align-items:center;
}
.info-block{margin:0 20px 12px;font-size:13.5px;color:var(--text-secondary);line-height:1.55;}
.info-block b{color:var(--text-primary);}
.primary-btn{
  margin:16px 20px;padding:15px;border-radius:14px;border:none;width:calc(100% - 40px);
  background:var(--text-primary);color:#0A0A0B;font-size:15px;font-weight:650;cursor:pointer;
}
.primary-btn:disabled{opacity:0.35;}
.ghost-btn{
  margin:8px 20px;padding:13px;border-radius:14px;width:calc(100% - 40px);
  background:transparent;border:1px solid var(--border-subtle);color:var(--text-secondary);
  font-size:14px;font-weight:600;text-align:center;cursor:pointer;
}

/* summary reward moment */
.summary-hero{text-align:center;padding:36px 30px 10px;}
.summary-hero .check{
  width:64px;height:64px;border-radius:50%;background:rgba(74,144,226,0.12);
  border:1px solid rgba(74,144,226,0.4);display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:28px;color:var(--recovery-fresh);
}
.summary-hero h2{font-size:22px;margin:0 0 4px;letter-spacing:-0.3px;}
.summary-hero p{font-size:13.5px;color:var(--text-secondary);margin:0;}
.stim-item{display:flex;align-items:center;gap:12px;padding:12px 20px;}
.stim-item .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.stim-name{font-size:14.5px;font-weight:600;flex:1;}
.stim-role{font-size:12px;color:var(--text-tertiary);}

/* library */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:4px 20px 14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  flex-shrink:0;padding:8px 14px;border-radius:99px;font-size:13px;font-weight:600;
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;
  white-space:nowrap;
}
.filter-chip.active{background:var(--text-primary);color:#0A0A0B;border-color:var(--text-primary);}

/* empty state */
.empty{text-align:center;padding:60px 30px;color:var(--text-tertiary);}
.empty .e-icon{font-size:34px;margin-bottom:10px;}
.empty p{font-size:14px;line-height:1.5;}

/* settings */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border-subtle);
}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:14.5px;}
.setting-select{
  background:var(--glass);border:1px solid var(--border-subtle);color:var(--text-primary);
  border-radius:10px;padding:8px 10px;font-size:13px;font-weight:600;
}
.day-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:0 20px 4px;}
.day-cell{
  aspect-ratio:1;border-radius:12px;background:var(--glass);border:1px solid var(--border-subtle);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;
  color:var(--text-secondary);gap:3px;
}
.day-cell b{font-size:13px;color:var(--text-primary);}

/* calendar / history */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px;}
.cal-nav-btn{
  width:34px;height:34px;border-radius:50%;background:var(--glass);border:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);
}
.cal-nav-btn.disabled{opacity:0.3;pointer-events:none;}
.cal-nav-btn svg{width:14px;height:14px;}
.cal-nav-title{font-size:15px;font-weight:650;letter-spacing:-0.2px;text-transform:capitalize;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:0 0 6px;}
.cal-weekdays div{text-align:center;font-size:10.5px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-cell{
  aspect-ratio:1;border-radius:12px;background:var(--glass);border:1px solid var(--border-subtle);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:13px;font-weight:600;color:var(--text-primary);cursor:pointer;position:relative;
}
.cal-cell:active{transform:scale(0.94);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cal-cell.future{color:var(--text-tertiary);cursor:default;opacity:0.5;}
.cal-cell.today{border-color:var(--text-primary);border-width:1.5px;}
.cal-cell .cal-dot{width:6px;height:6px;border-radius:50%;}
.cal-cell.trained{background:rgba(74,144,226,0.12);border-color:rgba(74,144,226,0.35);}
.cal-cell.trained .cal-dot{background:var(--recovery-fresh);}
.cal-cell.rest .cal-dot{background:var(--text-tertiary);}
.cal-cell.missed .cal-dot{background:var(--recovery-stimulated);}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;margin:16px 20px 4px;}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);}
.cal-legend-item .cal-dot{width:7px;height:7px;border-radius:50%;}

/* nutrition */

.nutri-hero .kcal-num{font-size:38px;font-weight:750;letter-spacing:-0.8px;}
.nutri-hero .kcal-range{font-size:12.5px;color:var(--text-tertiary);margin-top:2px;}
.nutri-macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px;}
.nutri-macro-tile{background:var(--glass);border:1px solid var(--border-subtle);border-radius:12px;padding:10px 6px;}
.nutri-macro-tile .m-n{font-size:16px;font-weight:700;}
.nutri-macro-tile .m-l{font-size:10.5px;color:var(--text-secondary);margin-top:1px;}
.nutri-macro-tile .m-r{font-size:9.5px;color:var(--text-tertiary);margin-top:1px;}
.nutrient-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border-subtle);}
.nutrient-row:last-child{border-bottom:none;}
.nutrient-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;margin-top:1px;}
.nutrient-info{flex:1;min-width:0;}
.nutrient-top{display:flex;justify-content:space-between;font-size:13px;}
.nutrient-name{font-weight:600;color:var(--text-primary);}
.nutrient-val{font-weight:600;color:var(--text-secondary);}
.nutrient-track{height:6px;border-radius:4px;background:var(--glass);border:1px solid var(--border-subtle);overflow:hidden;margin-top:6px;}
.nutrient-fill{height:100%;border-radius:4px;transition:width .3s;}
.nutrient-sub{font-size:11px;margin-top:4px;font-weight:600;}
.warn-card{margin:12px 20px;padding:14px 16px;border-radius:14px;background:rgba(226,74,74,0.08);border:1px solid rgba(226,74,74,0.3);}
.warn-line{font-size:12.5px;color:#F0A0A0;font-weight:600;line-height:1.5;}
.warn-line + .warn-line{margin-top:6px;}
.insight-card{margin:12px 20px;padding:18px;border-radius:18px;background:linear-gradient(145deg,#1a1a1d,#101011);border:1px solid var(--border-strong);}
.insight-eyebrow{font-size:11.5px;color:var(--text-tertiary);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.insight-title{font-size:17px;font-weight:700;margin:6px 0 4px;letter-spacing:-0.2px;}
.insight-body{font-size:13px;color:var(--text-secondary);line-height:1.55;}
.insight-tag{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-top:10px;letter-spacing:0.02em;}
.food-item{display:flex;align-items:center;gap:10px;padding:12px 14px;margin:6px 20px;border-radius:14px;background:var(--glass);border:1px solid var(--border-subtle);cursor:pointer;}

.food-main{flex:1;min-width:0;}
.food-name{font-size:14.5px;font-weight:600;}
.food-sub{font-size:11.5px;color:var(--text-tertiary);margin-top:1px;}
.food-add{width:28px;height:28px;border-radius:50%;background:var(--glass);border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--text-primary);font-size:16px;flex-shrink:0;}
.logged-item{display:flex;align-items:center;gap:10px;padding:11px 14px;margin:6px 20px;border-radius:14px;background:rgba(74,144,226,0.06);border:1px solid rgba(74,144,226,0.2);}
.logged-main{flex:1;min-width:0;}
.logged-name{font-size:14px;font-weight:600;}
.logged-sub{font-size:11.5px;color:var(--text-tertiary);margin-top:1px;}
.logged-del{width:24px;height:24px;border-radius:50%;background:var(--glass);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:13px;cursor:pointer;flex-shrink:0;}

.tier-label{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  margin:18px 20px 6px;
}
.tier-label .sq{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.tier-note{font-size:11.5px;color:var(--text-tertiary);font-weight:500;text-transform:none;letter-spacing:0;margin-left:2px;}
.tier-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
  padding:4px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.04em;
  margin-top:6px;
}
.toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  background:var(--bg-elevated);border:1px solid var(--border-strong);
  padding:12px 20px;border-radius:14px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity .3s, transform .3s;
  pointer-events:none;max-width:80%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

function findFoodItem(id){

}

/* ============ MỤC TIÊU DINH DƯỠNG (RDA & mục tiêu tăng cân nhẹ nhàng) ============
   Người dùng: mục tiêu tối thượng là tăng cân từ từ (lean gain), đạt ~75kg trong 1 năm,
   giữ thân hình slimfit — KHÔNG bulk thô như vận động viên thể hình.
   -> Chiến lược: mức thặng dư calo nhỏ (theo tổng cân cần tăng / số ngày còn lại),
   đạm cao để ưu tiên phát triển cơ thay vì mỡ, cảnh báo nếu ăn dư quá đà. */
function bmrFor(weightKg, heightCm, age, gender){
  // Mifflin-St Jeor
  const base = 10*weightKg + 6.25*heightCm - 5*age;
  return gender==='female' ? base-161 : base+5;
}
const ACTIVITY_MULT = {low:1.375, moderate:1.55, high:1.725};
const ACTIVITY_LABEL = {low:'Ít vận động (văn phòng, ít tập)', moderate:'Vừa phải (tập gym đều 3-5 buổi/tuần)', high:'Nhiều (tập nặng + vận động nhiều)'};
function currentWeight(){
  return state.measurements.length? state.measurements[state.measurements.length-1].weight : null;
}
function tdeeToday(){
  if(!state.profile) return null;
  const w = currentWeight() || state.profile.startWeight || 65;
  const gender = state.profile.gender || 'male';
  const activity = state.profile.activityLevel || 'moderate';
  const bmr = bmrFor(w, state.profile.height, state.profile.age, gender);
  return Math.round(bmr * (ACTIVITY_MULT[activity]||1.55));
}
function goalDailySurplus(){
  // Thặng dư calo/ngày để tăng cân đều đặn tới goalWeight vào goalDate, dàn trải cho êm & lean (không nhồi nhét)
  if(!state.profile) return 250;
  const w = currentWeight() || state.profile.startWeight || 65;
  const goalW = state.profile.goalWeight || 75;
  const goalDate = state.profile.goalDate ? new Date(state.profile.goalDate) : null;
  const daysLeft = goalDate ? Math.max(30, Math.round((goalDate-new Date())/86400000)) : 365;
  const kgToGain = Math.max(0, goalW - w);
  if(kgToGain<=0) return 0; // đã đạt/vượt mục tiêu -> không cần dư calo nữa
  const raw = Math.round((kgToGain*7700)/daysLeft);
  return Math.min(raw, 400); // chặn trần 400kcal/ngày để tránh tăng nhanh -> thô, chỉ nên lean & từ từ
}
function dailyCalorieTarget(){
  const t = tdeeToday();
  if(t==null) return null;
  return t + goalDailySurplus();
}
function dailyProteinTargetG(){
  const w = currentWeight() || (state.profile? state.profile.startWeight : 65) || 65;
  return {min: Math.round(w*1.6), max: Math.round(w*2.2)}; // g/kg — mức khuyến nghị cho lean gain, ưu tiên cơ hơn mỡ
}
function nutrientTargets(){
  const w = currentWeight() || (state.profile? state.profile.startWeight : 65) || 65;
  const cal = dailyCalorieTarget() || 2400;
  const protein = dailyProteinTargetG();
  const fatMaxG = Math.round(cal*0.30/9);
  return {
    calorie: {target: cal, type:'range'},
    protein: {min: protein.min, max: protein.max, unit:'g', type:'min'},
    fat: {max: fatMaxG, unit:'g', type:'max'},
    carb: {max: Math.round((cal - protein.min*4 - fatMaxG*9)/4), unit:'g', type:'max'},
    sugar: {max: Math.round(cal*0.10/4), unit:'g', type:'max', warn:'Đường tự do nên dưới 10% tổng calo (WHO)'},
    fiber: {min: 28, unit:'g', type:'min', warn:'Người trưởng thành nên ăn tối thiểu ~25-30g chất xơ/ngày'},
    sodium: {max: 2000, unit:'mg', type:'max', warn:'WHO khuyến nghị dưới 2000mg Natri/ngày (~5g muối)'},
    potassium: {min: 3500, unit:'mg', type:'min'},
    satFat: {max: Math.round(cal*0.10/9), unit:'g', type:'max', warn:'Chất béo bão hoà nên dưới 10% tổng calo'},
    unsatFat: {min: Math.round(fatMaxG*0.5), unit:'g', type:'min'},
    calcium: {min: 1000, unit:'mg', type:'min'},
    vitD: {min: 15, unit:'mcg', type:'min'},
    iron: {min: 8, unit:'mg', type:'min'},
    magnesium: {min: 400, unit:'mg', type:'min'},
    zinc: {min: 11, unit:'mg', type:'min'},
    omega3: {min: 1300, unit:'mg', type:'min'},

  };
}

  sleepLogs: {}, // {'toDateString của ĐÊM đó': số giờ ngủ} — nhập hôm nay cho giấc ngủ đêm qua, nên khoá lưu theo ngày HÔM QUA
  nutritionLogs: {}, // {'toDateString': [{id, foodId, qty, addedAt}, ...]} — nhật ký ăn uống theo ngày
  waterLogs: {}, // {'toDateString': tổng ml nước uống trực tiếp đã log (chưa gồm nước trong món ăn)}
  weeklyInsight: null // {computedAt, calAvg, tdee, targetCal, diffAvg, weightDelta, tendency, recommendation, warnings:[...]}
};
let view = {name:'home', params:{}};

// Lưu bằng localStorage: dữ liệu ở lại vĩnh viễn trên chính trình duyệt/máy đang mở file,
// không đồng bộ qua máy khác — đúng như mong muốn "mỗi máy dữ liệu riêng".
async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    }
  }catch(e){ /* no data yet — use defaults */ }

  // Ép cập nhật lịch tập chuẩn mới nếu dữ liệu cũ chưa khớp phiên bản lịch hiện tại.
  // Lịch sử buổi tập (sessions) vẫn được giữ nguyên — chỉ reset split hiện hành.
  if(state.scheduleVersion !== SCHEDULE_VERSION){
    state.split = DEFAULT_SPLIT;
    state.scheduleVersion = SCHEDULE_VERSION;
    if(state.activeSession && !DAY_TEMPLATES.includes(state.activeSession.dayLabel)){
      state.activeSession = null; // buổi tập đang dở theo lịch cũ không còn khớp cấu trúc mới
    }
    await saveState();
  }
}
async function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('save failed', e); showToast('Không thể lưu dữ liệu trên máy này'); }
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ HELPERS ============ */
function todayKey(){ return DAY_KEYS[new Date().getDay()]; }
function todayTemplate(){ return state.split[todayKey()] || 'Rest'; }
function exercisesForDay(dayTemplate){ return EXERCISES.filter(e=> Array.isArray(e.day) ? e.day.includes(dayTemplate) : e.day===dayTemplate); }

/* --- giờ ngủ đêm qua ---
   Nhập "hôm nay" luôn nói về đêm hôm qua -> lưu theo toDateString của NGÀY HÔM QUA,
   để khi xem lịch sử ngày hôm qua sẽ thấy đúng số giờ đã ngủ đêm đó. */
function yesterdayDateObj(){ const d = new Date(); d.setDate(d.getDate()-1); return d; }
const SLEEP_LOW_THRESHOLD = 6.5;
function sleepHoursForNightOf(dateObj){ return (state.sleepLogs||{})[dateObj.toDateString()]; }
function todaySleepHours(){ return sleepHoursForNightOf(yesterdayDateObj()); }
function sleepRecoveryInfo(hours){
  if(hours==null) return null;
  return hours < SLEEP_LOW_THRESHOLD
    ? {text:'Hồi phục thấp', color:'var(--recovery-stimulated)'}
    : {text:'Hồi phục tốt', color:'var(--recovery-fresh)'};
}
function promptTodaySleep(){
  const existing = todaySleepHours();
  const val = prompt('Số giờ ngủ đêm qua (giờ)', existing!=null? existing : '');
  if(val===null) return;
  const h = parseFloat(val);
  if(isNaN(h) || h<0 || h>24){ showToast('Số giờ ngủ không hợp lệ'); return; }
  state.sleepLogs = state.sleepLogs || {};
  state.sleepLogs[yesterdayDateObj().toDateString()] = h;
  saveState(); render(); showToast('Đã lưu giờ ngủ đêm qua');
}
function measurementForDate(dateObj){
  return state.measurements.find(m=> new Date(m.date).toDateString()===dateObj.toDateString());
}

/* --- timer buổi tập: bắt đầu / tạm ngưng / hoàn thành --- */
function currentElapsedMs(){
  if(!state.activeSession) return 0;
  let ms = state.activeSession.elapsedMs||0;
  if(state.activeSession.running && state.activeSession.lastResumeAt){
    ms += Date.now() - new Date(state.activeSession.lastResumeAt).getTime();
  }
  return ms;
}
function formatElapsed(ms){
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  const pad = n=>String(n).padStart(2,'0');
  return h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function startWorkoutSession(){
  if(state.activeSession) return;
  const now = new Date().toISOString();
  state.activeSession = {dayLabel: todayTemplate(), startedAt:now, sets:[], running:true, lastResumeAt:now, elapsedMs:0};
  saveState(); render(); showToast('Bắt đầu buổi tập 💪');
}
function pauseWorkoutSession(){
  if(!state.activeSession || !state.activeSession.running) return;
  state.activeSession.elapsedMs = currentElapsedMs();
  state.activeSession.running = false;
  state.activeSession.lastResumeAt = null;
  saveState(); render(); showToast('Đã tạm ngưng ⏸ — giờ tập đã dừng lại');
}
function resumeWorkoutSession(){
  if(!state.activeSession || state.activeSession.running) return;
  state.activeSession.running = true;
  state.activeSession.lastResumeAt = new Date().toISOString();
  saveState(); render(); showToast('Tiếp tục tập ▶');
}
function completeWorkoutSession(){
  if(!state.activeSession || state.activeSession.sets.length===0){ showToast('Hãy log ít nhất 1 bài tập trước khi hoàn thành'); return; }
  const elapsedMs = currentElapsedMs();
  const session = Object.assign({}, state.activeSession, {
    id:'s_'+Date.now(),
    endedAt:new Date().toISOString(),
    durationSeconds: Math.round(elapsedMs/1000)
  });
  delete session.running; delete session.lastResumeAt; delete session.elapsedMs;
  state.sessions.push(session);
  state.activeSession = null;
  saveState();
  goTo('summary', {sessionId:session.id});
}

/* --- finisher phụ (tuỳ chọn), chọn thêm 1 bài mỗi ngày tập --- */
function extraFinisherIdForToday(){ return (state.extraFinisherByDate||{})[new Date().toDateString()]; }
function setExtraFinisherForToday(exId){
  state.extraFinisherByDate = state.extraFinisherByDate || {};
  state.extraFinisherByDate[new Date().toDateString()] = exId;
  saveState();
}
function clearExtraFinisherForToday(){
  if(state.extraFinisherByDate) delete state.extraFinisherByDate[new Date().toDateString()];
  saveState();
}
// danh sách bài tập của ngày, CỘNG THÊM bài finisher phụ đã chọn cho hôm nay (nếu có) — dùng thay exercisesForDay ở mọi nơi cần đếm/log bài tập của "hôm nay"
function exercisesForDayWithExtra(dayTemplate){
  const base = exercisesForDay(dayTemplate);
  if(dayTemplate==='Rest') return base;
  const exId = extraFinisherIdForToday();
  if(exId){
    const ex = findExercise(exId);
    // ép tier='finisher' trên bản sao để luôn hiện đúng nhóm Finisher dù bài đó ở ngày khác có tier khác (VD accessory)
    if(ex && !base.some(b=>b.id===ex.id)) return [...base, Object.assign({}, ex, {tier:'finisher'})];
  }
  return base;
}
function findExercise(id){ return EXERCISES.find(e=>e.id===id); }
function findMuscle(id){ return MUSCLES.find(m=>m.id===id); }
function estimateMinutes(dayTemplate){
  const exs = exercisesForDayWithExtra(dayTemplate);
  const secs = exs.reduce((sum,e)=> sum + e.sets*(e.rest+40), 0);
  return Math.round(secs/60);
}
function parseRepRange(reps){
  const m = reps.match(/(\d+)-(\d+)/);
  if(m) return [parseInt(m[1]), parseInt(m[2])];
  return [null,null];
}

/* --- streak ---
   "covered" = 1 ngày được tính vào chuỗi, gồm: có buổi tập kết thúc trong ngày,
   ngày nghỉ đã tick thủ công, ngày nghỉ CỐ ĐỊNH (Thứ 5 & Chủ Nhật — tự động, không cần mở app),
   hoặc ngày đã được bù bằng "khôi phục chuỗi". */
const FIXED_REST_DOW = [4, 0]; // Thứ 5 (Thu=4) và Chủ Nhật (Sun=0) theo Date.getDay()
function isFixedRestDOW(dow){ return FIXED_REST_DOW.includes(dow); }
function isFixedRestDate(date){ return isFixedRestDOW(date.getDay()); }

function coveredDateSet(){
  const s = new Set(state.sessions.map(x=> new Date(x.endedAt).toDateString()));
  (state.restCheckins||[]).forEach(d=> s.add(d));
  (state.streakSaveDates||[]).forEach(d=> s.add(d));
  return s;
}
function isDayCovered(date, coveredSet){
  const set = coveredSet || coveredDateSet();
  if(set.has(date.toDateString())) return true;
  return isFixedRestDate(date);
}

function computeStreak(){
  const covered = coveredDateSet();
  let streak=0; let d = new Date();
  // if no session today yet, still count backwards from yesterday
  if(!isDayCovered(d, covered)) d.setDate(d.getDate()-1);
  while(isDayCovered(d, covered)){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function isRestCheckedToday(){ return state.restCheckins.includes(new Date().toDateString()); }
function checkInRest(){
  const t = new Date().toDateString();
  if(!state.restCheckins.includes(t)) state.restCheckins.push(t);
  saveState(); render(); showToast('Đã tick ngày nghỉ 🌙');
}

/* --- khôi phục chuỗi (streak save), tối đa 3 lần / tháng --- */
const STREAK_SAVE_LIMIT = 3;
function monthKeyOf(d){ return d.getFullYear()+'-'+d.getMonth(); }
function streakSavesUsedThisMonth(){
  const mk = monthKeyOf(new Date());
  return (state.streakSaveLog||[]).filter(iso=> monthKeyOf(new Date(iso))===mk).length;
}
function streakSavesRemaining(){ return Math.max(0, STREAK_SAVE_LIMIT - streakSavesUsedThisMonth()); }
// tìm ngày hổng gần nhất ngay trước chuỗi hiện tại (đi lùi từ hôm nay/hôm qua)
function findStreakGap(){
  const covered = coveredDateSet();
  let d = new Date(); d.setHours(0,0,0,0);
  if(!isDayCovered(d, covered)) d.setDate(d.getDate()-1);
  while(isDayCovered(d, covered)) d.setDate(d.getDate()-1);
  const gapDate = new Date(d);
  const dayBeforeGap = new Date(d); dayBeforeGap.setDate(dayBeforeGap.getDate()-1);
  const reconnectsStreak = isDayCovered(dayBeforeGap, covered);
  return {gapDate, reconnectsStreak};
}
function canUseStreakSave(){
  if(streakSavesRemaining()<=0) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const {gapDate, reconnectsStreak} = findStreakGap();
  if(gapDate.getTime()>=today.getTime()) return false; // hôm nay chưa "trôi qua" thì chưa tính là hổng
  return reconnectsStreak;
}
function useStreakSave(){
  if(!canUseStreakSave()){ showToast('Không thể khôi phục chuỗi lúc này'); return; }
  const {gapDate} = findStreakGap();
  state.streakSaveDates = state.streakSaveDates||[];
  state.streakSaveDates.push(gapDate.toDateString());
  state.streakSaveLog = state.streakSaveLog||[];
  state.streakSaveLog.push(new Date().toISOString());
  saveState(); render();
  showToast(`Đã khôi phục chuỗi 🔥 · còn ${streakSavesRemaining()} lần trong tháng này`);
}

/* --- điều chỉnh tốc độ hồi phục theo giấc ngủ ---
   Cơ sở lý thuyết: thiếu ngủ làm giảm tổng hợp protein cơ (muscle protein synthesis) và
   giảm tiết GH/testosterone ban đêm, khiến tốc độ hồi phục thực tế chậm hơn so với hồi phục
   chỉ tính theo thời gian trôi qua. Ngủ đủ 7-9h là mốc chuẩn (hệ số 1.0). Áp dụng liên tục
   theo TỪNG NGÀY DƯƠNG LỊCH đã trôi qua kể từ buổi tập — kể cả những ngày đó là ngày nghỉ,
   vì hồi phục cơ diễn ra suốt ngày/đêm chứ không riêng gì ngày tập. */
const SLEEP_EFFICIENCY_POINTS = [
  [0, 0.25], [4, 0.35], [5, 0.5], [6, 0.7], [7, 0.88], [8, 1.0], [9, 1.08], [10, 1.12], [12, 1.12]
];
function sleepEfficiencyMultiplier(hours){
  if(hours==null || isNaN(hours)) return 1.0; // chưa có dữ liệu đêm đó -> coi như trung tính, không phạt cũng không thưởng
  const h = Math.max(0, Math.min(12, hours));
  const pts = SLEEP_EFFICIENCY_POINTS;
  for(let i=0;i<pts.length-1;i++){
    const [h0,e0] = pts[i], [h1,e1] = pts[i+1];
    if(h>=h0 && h<=h1){
      const t = (h-h0)/(h1-h0);
      return e0 + (e1-e0)*t;
    }
  }
  return 1.0;
}
/* Tính số "giờ hồi phục hiệu quả" giữa 2 mốc thời gian, chia theo từng ngày dương lịch,
   mỗi ngày dùng hệ số hiệu quả riêng dựa trên giấc ngủ ĐÊM TRƯỚC ngày đó. */
function effectiveRecoveryHours(fromDate, toDate){
  let total = 0;
  let cursor = new Date(fromDate);
  const end = new Date(toDate);
  if(cursor >= end) return 0;
  while(cursor < end){
    const dayStart = new Date(cursor); dayStart.setHours(0,0,0,0);
    const nextMidnight = new Date(dayStart); nextMidnight.setDate(nextMidnight.getDate()+1);
    const segmentEnd = nextMidnight < end ? nextMidnight : end;
    const hoursInSegment = (segmentEnd - cursor) / 3600000;
    const nightBefore = new Date(dayStart); nightBefore.setDate(nightBefore.getDate()-1);
    const sh = sleepHoursForNightOf(nightBefore);
    const eff = sleepEfficiencyMultiplier(sh);
    total += hoursInSegment * eff;
    cursor = segmentEnd;
  }
  return total;
}

/* --- recovery engine ---
   for each muscle: find most recent session touching it, compute volume_score & avg rpe,
   derive recovery_hours_needed, then recovery_percent from EFFECTIVE elapsed hours (đã điều
   chỉnh theo giấc ngủ, tính cả ngày nghỉ). */
function roleWeight(role){ return role==='primary'?1:role==='secondary'?0.5:0.25; }

function muscleTouchesInSession(session, muscleId){
  // returns list of {role, rpe, count} for exercises in session touching this muscle
  const out = [];
  session.sets.forEach(entry=>{
    const ex = findExercise(entry.exerciseId);
    if(!ex) return;
    let role = null;
    if(ex.primary===muscleId) role='primary';
    else if(ex.secondary.includes(muscleId)) role='secondary';
    else if(ex.stabilizer.includes(muscleId)) role='stabilizer';
    if(role) out.push({role, rpe:7, count:entry.sets||1});
  });
  return out;
}

function getMuscleRecovery(muscleId){
  // find most recent session (finished) touching this muscle
  let latest=null, latestTouches=null;
  for(const s of state.sessions){
    const touches = muscleTouchesInSession(s, muscleId);
    if(touches.length>0){
      if(!latest || new Date(s.endedAt) > new Date(latest.endedAt)){ latest=s; latestTouches=touches; }
    }
  }
  if(!latest) return {status:'inactive', percent:100, etaHours:0, lastAt:null};

  const volumeScore = latestTouches.reduce((sum,t)=> sum + roleWeight(t.role)*t.count, 0);
  const avgRpe = latestTouches.reduce((sum,t)=> sum + t.rpe, 0) / latestTouches.length;
  const baselineSets = 8;
  const volumeMultiplier = Math.min(1.5, Math.max(0.7, volumeScore / baselineSets));
  const rpeMultiplier = Math.min(1.3, Math.max(0.7, 0.8 + (avgRpe-6)*0.1));
  const baseHours = BASE_RECOVERY_HOURS[muscleId] || 48;
  const hoursNeeded = baseHours * volumeMultiplier * rpeMultiplier;

  const lastAt = new Date(latest.endedAt);
  const now = new Date();
  const hoursElapsed = (now.getTime() - lastAt.getTime()) / 3600000;
  const effectiveHours = effectiveRecoveryHours(lastAt, now);
  const percent = Math.min(100, Math.max(0, Math.round((effectiveHours/hoursNeeded)*100)));
  const isToday = lastAt.toDateString() === new Date().toDateString();
  const daysElapsed = hoursElapsed/24;
  const avgEfficiency = hoursElapsed>0 ? (effectiveHours/hoursElapsed) : 1;

  let status;
  if(isToday) status='stimulated';
  else if(percent<100) status='recovering';
  else if(daysElapsed<=7) status='fresh';
  else status='inactive';

  const remainingEffectiveHours = Math.max(0, hoursNeeded-effectiveHours);
  const etaHours = avgEfficiency>0 ? Math.round(remainingEffectiveHours/avgEfficiency) : Math.round(remainingEffectiveHours);
  return {status, percent, etaHours, lastAt, avgEfficiency, sleepAdjusted: avgEfficiency<0.97 || avgEfficiency>1.03};
}
function recoveryColor(status){
  return {stimulated:'var(--recovery-stimulated)', recovering:'var(--recovery-recovering)', fresh:'var(--recovery-fresh)', inactive:'var(--recovery-inactive)'}[status];
}
function recoveryLabel(status){
  return {stimulated:'Vừa tập hôm nay', recovering:'Đang hồi phục', fresh:'Đã hồi phục', inactive:'Chưa tập gần đây'}[status];
}

/* --- chọn nhanh mức tạ: không ghi log từng set, chỉ chọn 1 trong 2 gợi ý --- */
const BODYWEIGHT_EQUIP = ['Không dụng cụ','Tường'];
function weightStep(ex){ return ex.compound ? 2.5 : 1.25; }
function isBodyweight(ex){ return BODYWEIGHT_EQUIP.some(e=> ex.equipment.includes(e)); }
function baseSeedWeight(ex){
  // ước lượng khởi điểm hợp lý theo loại dụng cụ — chỉ là điểm bắt đầu, người dùng tự chọn mức phù hợp
  if(ex.equipment.includes('Thanh đòn')) return ex.compound ? 20 : 10;
  if(ex.equipment.includes('Tạ đơn')) return 8;
  if(ex.equipment.includes('Máy')) return 15;
  if(ex.equipment.includes('Cáp')) return 10;
  return 10;
}
// 2 lựa chọn gợi ý: nặng hơn/ít rep hơn, hoặc nhẹ hơn/nhiều rep hơn — đều nằm trong khoảng rep mục tiêu
function getOptions(exId){
  const ex = findExercise(exId);
  const prog = state.exerciseProgress[exId];
  const [repMin, repMax] = parseRepRange(ex.reps);
  const step = weightStep(ex);
  if(isBodyweight(ex)){
    return [
      {label:`${ex.sets} set × ${repMin||ex.reps} cái`, weight:null, reps:repMin||null},
      {label:`${ex.sets} set × ${repMax||ex.reps} cái`, weight:null, reps:repMax||null},
    ];
  }
  const base = prog ? prog.weight : baseSeedWeight(ex);
  const light = prog ? Math.max(step, base-step) : base;
  const heavy = base+step;
  return [
    {label:`${ex.sets} set × ${repMax||ex.reps} cái · ${light}kg`, weight:light, reps:repMax||null, note:'nhẹ hơn, nhiều rep hơn'},
    {label:`${ex.sets} set × ${repMin||ex.reps} cái · ${heavy}kg`, weight:heavy, reps:repMin||null, note:'nặng hơn, ít rep hơn'},
  ];
}
const OVERLOAD_THRESHOLD_DAYS = 21; // ~3 tuần ở cùng 1 mức mới gợi ý tăng — phù hợp mục tiêu thon gọn, không cần tăng nhanh
function daysSince(iso){ return Math.floor((Date.now()-new Date(iso).getTime())/86400000); }
function pendingBump(exId){
  const prog = state.exerciseProgress[exId];
  if(!prog || prog.weight==null) return false;
  return daysSince(prog.sinceDate) >= OVERLOAD_THRESHOLD_DAYS;
}
function chooseOption(exId, opt){
  state.exerciseProgress[exId] = {weight:opt.weight, reps:opt.reps, sinceDate:new Date().toISOString(), timesCompleted:0};
  saveState();
}
function acceptBump(exId){
  const ex = findExercise(exId);
  const prog = state.exerciseProgress[exId];
  const step = weightStep(ex);
  prog.weight = (prog.weight||0) + step;
  prog.sinceDate = new Date().toISOString();
  prog.timesCompleted = 0;
  saveState();
  return prog;
}
function declineBump(exId){
  // giữ nguyên sinceDate cũ -> lần tập kế tiếp của bài này sẽ hỏi lại
  const prog = state.exerciseProgress[exId];
  prog.timesCompleted = (prog.timesCompleted||0)+1;
  saveState();
}

function saveProfile(){
  const name = document.getElementById('obName').value.trim();
  const age = parseFloat(document.getElementById('obAge').value);
  const height = parseFloat(document.getElementById('obHeight').value);
  const weight = parseFloat(document.getElementById('obWeight').value);
  const gender = document.getElementById('obGender').value;
  const activityLevel = document.getElementById('obActivity').value;
  const goalWeight = parseFloat(document.getElementById('obGoalWeight').value) || 75;
  const goalMonths = parseFloat(document.getElementById('obGoalMonths').value) || 12;
  if(!name){ showToast('Vui lòng nhập tên'); return; }
  if(isNaN(age) || isNaN(height) || isNaN(weight)){ showToast('Vui lòng nhập đủ tuổi, chiều cao, cân nặng'); return; }
  const goalDate = new Date(); goalDate.setMonth(goalDate.getMonth()+goalMonths);
  state.profile = {name, age, height, gender, activityLevel, startWeight:weight, goalWeight, goalDate:goalDate.toISOString(), createdAt:new Date().toISOString()};
  if(state.measurements.length===0){
    state.measurements.push({date:new Date().toISOString(), weight, chest:null});
  }
  saveState();
  goTo('home');
}
function editProfile(){
  const name = prompt('Tên', state.profile.name);
  if(name===null) return;
  const age = parseFloat(prompt('Tuổi', state.profile.age));
  const height = parseFloat(prompt('Chiều cao (cm)', state.profile.height));
  if(!name.trim() || isNaN(age) || isNaN(height)){ showToast('Thông tin không hợp lệ'); return; }
  const genderIn = prompt('Giới tính (nam/nữ)', state.profile.gender==='female'?'nữ':'nam');
  const gender = (genderIn||'').trim().toLowerCase().startsWith('n') && (genderIn||'').toLowerCase().includes('ữ') ? 'female' : (state.profile.gender||'male');
  state.profile = Object.assign({}, state.profile, {name:name.trim(), age, height, gender});
  saveState(); render(); showToast('Đã cập nhật hồ sơ');
}
function editGoal(){
  const goalWeight = parseFloat(prompt('Mục tiêu cân nặng (kg)', state.profile.goalWeight||75));
  if(isNaN(goalWeight)){ showToast('Số không hợp lệ'); return; }
  const monthsIn = prompt('Còn lại bao nhiêu tháng để đạt mục tiêu?', state.profile.goalDate? Math.max(1,Math.round((new Date(state.profile.goalDate)-new Date())/2629800000)) : 12);
  const months = parseFloat(monthsIn);
  if(isNaN(months) || months<=0){ showToast('Số tháng không hợp lệ'); return; }
  const goalDate = new Date(); goalDate.setMonth(goalDate.getMonth()+months);
  const activityIn = prompt('Mức vận động (1=ít, 2=vừa, 3=nhiều)', state.profile.activityLevel==='low'?1:(state.profile.activityLevel==='high'?3:2));
  const activityMap = {'1':'low','2':'moderate','3':'high'};
  const activityLevel = activityMap[(activityIn||'').trim()] || state.profile.activityLevel || 'moderate';
  state.profile = Object.assign({}, state.profile, {goalWeight, goalDate:goalDate.toISOString(), activityLevel});
  state.weeklyInsight = null; // buộc tính lại vì mục tiêu đã đổi
  saveState(); render(); showToast('Đã cập nhật mục tiêu');
}

function promptTodayWeight(){
  const last = state.measurements[state.measurements.length-1];
  const todayLogged = last && new Date(last.date).toDateString()===new Date().toDateString();
  const val = prompt('Cân nặng hôm nay (kg)', todayLogged? last.weight : (last? last.weight : ''));
  if(val===null) return;
  const w = parseFloat(val);
  if(isNaN(w)){ showToast('Cân nặng không hợp lệ'); return; }
  if(todayLogged){ last.weight = w; }
  else{ state.measurements.push({date:new Date().toISOString(), weight:w, chest:null}); }
  saveState(); render(); showToast('Đã lưu cân nặng hôm nay');
}

function renderToday(){
  const dayTemplate = state.activeSession ? state.activeSession.dayLabel : todayTemplate();
  const exs = exercisesForDayWithExtra(dayTemplate);
  const isRest = dayTemplate==='Rest';

  if(isRest && !state.activeSession){
    const fixedRest = isFixedRestDate(new Date());
    const checked = isRestCheckedToday();
    return `<div class="screen">
      <div class="topbar"><div><h1>Hôm nay</h1><div class="sub">Ngày nghỉ</div></div></div>
      <div class="empty"><div class="e-icon">🌙</div><p>Hôm nay là ngày nghỉ theo lịch tập của bạn.<br>Cơ bắp đang hồi phục để phát triển.</p></div>
      ${fixedRest
        ? `<div class="info-block" style="margin:0 20px;color:var(--text-secondary);">Thứ 5 & Chủ Nhật là ngày nghỉ cố định — chuỗi 🔥 của bạn tự động được giữ, không cần mở app để tick.</div>`
        : `<button class="hero-cta" style="margin:0 20px;width:calc(100% - 40px);" ${checked?'disabled':''} onclick="checkInRest()">${checked? '✓ Đã tick ngày nghỉ hôm nay' : 'Tick đã nghỉ hôm nay'}</button>`}
    </div>`;
  }

  const completed = state.activeSession ? state.activeSession.sets : [];
  const isDone = (exId)=> completed.some(s=>s.exerciseId===exId);
  const allDone = exs.length>0 && exs.every(ex=>isDone(ex.id));
  const extraFinisherId = extraFinisherIdForToday();

  return `<div class="screen">
    <div class="topbar">
      <div><h1>${dayTemplate}</h1><div class="sub">${exs.length} bài tập · ~${estimateMinutes(dayTemplate)} phút</div></div>
    </div>
    ${renderWorkoutControls()}
    ${TIER_ORDER.map(tier=>{
      const group = exs.filter(ex=> (ex.tier||'main')===tier);
      const t = TIER_INFO[tier];
      let html = '';
      if(group.length>0){
        html += `<div class="tier-label" style="color:${t.color}"><div class="sq" style="background:${t.color}"></div>${t.emoji} ${t.label}</div>
      ${group.map(ex=>{
        const done = isDone(ex.id);
        const prog = state.exerciseProgress[ex.id];
        const showBump = !done && pendingBump(ex.id);
        const isExtra = ex.id===extraFinisherId;
        const metaText = prog
          ? `${ex.sets} set × ${prog.reps||ex.reps}${prog.weight!=null? ' · '+prog.weight+'kg':''}`
          : `${ex.sets} set × ${ex.reps} reps`;
        return `
        ${showBump? `<div class="suggest-banner" style="margin:8px 20px;">
            <span>Đã tập ổn ${OVERLOAD_THRESHOLD_DAYS}+ ngày ở ${prog.weight}kg — tăng lên ${(prog.weight+weightStep(ex))}kg?</span>
          </div>
          <div style="display:flex;gap:8px;margin:0 20px 8px;">
            <div class="ghost-btn" style="flex:1;margin:0;" onclick="event.stopPropagation();respondBump('${ex.id}',false)">Chưa, giữ nguyên</div>
            <div class="ghost-btn" style="flex:1;margin:0;background:var(--text-primary);color:#0A0A0B;" onclick="event.stopPropagation();respondBump('${ex.id}',true)">Đồng ý, tăng</div>
          </div>` : ''}
        <div class="ex-item ${done?'done':''}">
          <div class="ex-status ${done?'done':''}" onclick="event.stopPropagation();toggleExerciseDone('${ex.id}')">${done? ICONS.check : ''}</div>
          <div class="ex-main" onclick="goTo('exerciseInfo',{id:'${ex.id}'})">
            <div class="ex-name">${ex.vi}${isExtra? ' <span style=\"color:var(--text-tertiary);font-size:11px;\">· tự chọn</span>':''}</div>
            <div class="ex-name-en">${ex.en}</div>
            <div class="ex-meta">${metaText}</div>
          </div>
          <div class="chev" onclick="goTo('exerciseInfo',{id:'${ex.id}'})">${ICONS.chev}</div>
        </div>
        ${isExtra && !done? `<div class="ghost-btn" style="margin:2px 20px 8px;font-size:12px;padding:8px;" onclick="clearExtraFinisherForToday();render();">Đổi bài finisher khác</div>`:''}`;
      }).join('')}`;
      }
      if(tier==='finisher' && !extraFinisherId){
        html += `<div class="ghost-btn" style="margin:8px 20px;" onclick="goTo('chooseFinisher')">+ Chọn thêm 1 bài Finisher (Bụng)</div>`;
      }
      return html;
    }).join('')}
  </div>`;
}

function renderWorkoutControls(){
  const todaySession = [...state.sessions].reverse().find(s=> new Date(s.endedAt).toDateString()===new Date().toDateString());
  if(todaySession && !state.activeSession){
    return `<div class="card glass">
      <div class="card-title">Buổi tập hôm nay</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:18px;font-weight:700;">✔ Đã hoàn thành</div>
        <div style="font-size:14px;color:var(--text-secondary);font-variant-numeric:tabular-nums;">${todaySession.durationSeconds!=null? '⏱ '+formatElapsed(todaySession.durationSeconds*1000) : ''}</div>
      </div>
      <div class="ghost-btn" style="margin:10px 0 0;" onclick="goTo('summary',{sessionId:'${todaySession.id}'})">Xem lại buổi tập</div>
    </div>`;
  }
  if(!state.activeSession){
    return `<div class="card glass">
      <div class="card-title">Thời gian tập</div>
      <div style="font-size:12.5px;color:var(--text-secondary);margin-bottom:10px;">Bấm bắt đầu để tính giờ tập cho buổi hôm nay. Buổi tập chỉ được tính vào chuỗi 🔥 khi bạn bấm Hoàn thành.</div>
      <button class="hero-cta" style="margin:0;" onclick="startWorkoutSession()">▶ Bắt đầu buổi tập</button>
    </div>`;
  }
  const running = state.activeSession.running;
  return `<div class="card glass">
    <div class="card-title">${running? 'Đang tập' : 'Đã tạm ngưng'}</div>
    <div id="liveTimerText" style="font-size:34px;font-weight:700;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;">${formatElapsed(currentElapsedMs())}</div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      ${running
        ? `<div class="ghost-btn" style="flex:1;margin:0;" onclick="pauseWorkoutSession()">⏸ Tạm ngưng</div>`
        : `<div class="ghost-btn" style="flex:1;margin:0;background:var(--text-primary);color:#0A0A0B;" onclick="resumeWorkoutSession()">▶ Tiếp tục</div>`}
      <div class="ghost-btn" style="flex:1;margin:0;" onclick="completeWorkoutSession()">✔ Hoàn thành</div>
    </div>
  </div>`;
}

function toggleExerciseDone(exId){
  if(!state.activeSession){
    showToast('Hãy bấm "Bắt đầu buổi tập" trước');
    return;
  }
  const idx = state.activeSession.sets.findIndex(s=>s.exerciseId===exId);
  if(idx>=0){
    // bỏ tick
    state.activeSession.sets.splice(idx,1);
    saveState(); render();
    return;
  }
  const ex = findExercise(exId);
  let prog = state.exerciseProgress[exId];
  if(!prog || prog.weight===undefined){
    // chưa từng chọn mức tạ/rep cho bài này -> mở trang chọn nhanh
    goTo('pickOption', {id:exId});
    return;
  }
  if(pendingBump(exId)){
    // đang chờ quyết định tăng tạ -> hỏi trước khi tick
    const step = weightStep(ex);
    const yes = confirm(`Đã tập ổn định ${OVERLOAD_THRESHOLD_DAYS}+ ngày ở ${prog.weight||''}kg. Tăng lên ${(prog.weight||0)+step}kg?`);
    if(yes) prog = acceptBump(exId); else declineBump(exId);
  }
  completeExercise(exId, prog);
}
function respondBump(exId, accept){
  let prog = state.exerciseProgress[exId];
  if(accept) prog = acceptBump(exId); else declineBump(exId);
  render();
}
function completeExercise(exId, prog){
  const ex = findExercise(exId);
  state.activeSession.sets.push({exerciseId:exId, weight:prog?prog.weight:null, reps:prog?prog.reps:null, sets:ex.sets, completedAt:new Date().toISOString()});
  saveState();
  const exs = exercisesForDayWithExtra(state.activeSession.dayLabel);
  const allDone = exs.every(e=> state.activeSession.sets.some(s=>s.exerciseId===e.id));
  render();
  showToast(allDone? 'Đã xong hết bài tập — bấm "Hoàn thành" để lưu buổi tập 🎉' : 'Đã hoàn thành ✔');
}

function renderSummary(sessionId){
  const session = state.sessions.find(s=>s.id===sessionId) || state.sessions[state.sessions.length-1];
  if(!session) return `<div class="screen"><div class="empty">Không có dữ liệu buổi tập.</div></div>`;

  const muscleRoles = {}; // muscleId -> best role
  const muscleCount = {}; // muscleId -> số bài tập chạm tới
  session.sets.forEach(set=>{
    const ex = findExercise(set.exerciseId);
    if(!ex) return;
    const assign = (id,role)=>{
      const rank = {primary:3,secondary:2,stabilizer:1};
      if(!muscleRoles[id] || rank[role]>rank[muscleRoles[id]]) muscleRoles[id]=role;
      muscleCount[id] = (muscleCount[id]||0)+1;
    };
    assign(ex.primary,'primary');
    ex.secondary.forEach(id=>assign(id,'secondary'));
    ex.stabilizer.forEach(id=>assign(id,'stabilizer'));
  });
  const sorted = Object.entries(muscleRoles).sort((a,b)=>{
    const rank = {primary:3,secondary:2,stabilizer:1};
    return rank[b[1]]-rank[a[1]];
  });
  const durationSeconds = session.durationSeconds!=null
    ? session.durationSeconds
    : Math.max(60, Math.round((new Date(session.endedAt)-new Date(session.startedAt))/1000) || estimateMinutes(session.dayLabel)*60);
  const durationMin = Math.max(1, Math.round(durationSeconds/60));
  const bw = state.measurements.length? state.measurements[state.measurements.length-1].weight : (state.profile? 65 : 65);
  const MET = 6; // cường độ tập kháng lực vừa-cao
  const calories = Math.round(MET * bw * (durationMin/60));
  const roleColor = {primary:'#E24A4A', secondary:'#E8A33D', stabilizer:'#D9C24A'};
  const roleLabel = {primary:'Primary', secondary:'Secondary', stabilizer:'Stabilizer'};

  return `<div class="screen">
    <div class="summary-hero">
      <div class="check">${ICONS.check}</div>
      <h2>Buổi tập hoàn thành</h2>
      <p>${session.dayLabel} · ${session.sets.length} bài tập</p>
    </div>
    <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="stat-tile"><div class="n" style="font-size:17px;">⏱️ ${formatElapsed(durationSeconds*1000)}</div><div class="l">Thời gian tập</div></div>
      <div class="stat-tile"><div class="n">🔥 ${calories}</div><div class="l">Calo ước tính</div></div>
      <div class="stat-tile"><div class="n">${sorted.length}</div><div class="l">Nhóm cơ</div></div>
    </div>
    <div class="section-label">Muscle Stimulation</div>
    ${sorted.map(([id,role])=>`
      <div class="stim-item">
        <div class="dot" style="background:${roleColor[role]}"></div>
        <div class="stim-name">${findMuscle(id).vi}</div>
        <div class="stim-role">${roleLabel[role]} · ${muscleCount[id]} bài</div>
      </div>`).join('')}
    <button class="primary-btn" onclick="goTo('home')">Về trang chủ</button>
  </div>`;
}

/* ============ RENDER: LỊCH SỬ TẬP (calendar) ============ */
function firstTrackedDate(){
  const dates = [];
  if(state.profile && state.profile.createdAt) dates.push(new Date(state.profile.createdAt));
  state.sessions.forEach(s=> dates.push(new Date(s.endedAt)));
  state.measurements.forEach(m=> dates.push(new Date(m.date)));
  if(!dates.length) return new Date();
  return new Date(Math.min(...dates.map(d=>d.getTime())));
}
function historyDayStatus(dateObj, coveredSet, todayObj, startObj){
  const cmp = new Date(dateObj); cmp.setHours(0,0,0,0);
  if(cmp.getTime() > todayObj.getTime()) return 'future';
  if(cmp.getTime() === todayObj.getTime()) return state.sessions.some(s=> new Date(s.endedAt).toDateString()===dateObj.toDateString()) ? 'trained-today' : 'today';
  if(state.sessions.some(s=> new Date(s.endedAt).toDateString()===dateObj.toDateString())) return 'trained';
  if(isFixedRestDate(dateObj) || coveredSet.has(dateObj.toDateString())) return 'rest';
  if(startObj && cmp.getTime() < startObj.getTime()) return 'before-tracking';
  return 'missed';
}
function renderHistory(){
  const now = new Date();
  const y = (view.params && view.params.y!=null) ? view.params.y : now.getFullYear();
  const m = (view.params && view.params.m!=null) ? view.params.m : now.getMonth();
  const monthStart = new Date(y, m, 1);
  const today = new Date(); today.setHours(0,0,0,0);
  const isCurrentMonth = (y===now.getFullYear() && m===now.getMonth());
  const first = firstTrackedDate(); first.setHours(0,0,0,0);
  const isFirstMonth = (y===first.getFullYear() && m===first.getMonth());
  const covered = coveredDateSet();

  const daysInMonth = new Date(y, m+1, 0).getDate();
  const startDow = monthStart.getDay(); // 0=CN
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(y, m, d));

  const monthLabel = monthStart.toLocaleDateString('vi-VN', {month:'long', year:'numeric'});
  const streak = computeStreak();
  const startedLabel = first.toLocaleDateString('vi-VN', {day:'numeric', month:'long', year:'numeric'});
  const trainedCount = state.sessions.length;

  const gridCells = cells.map(d=>{
    if(!d) return `<div class="cal-cell empty"></div>`;
    const status = historyDayStatus(d, covered, today, first);
    const cls = status==='trained-today' ? 'trained today' : status==='today' ? 'today' : status==='before-tracking' ? 'future' : status;
    const clickable = (status!=='future' && status!=='before-tracking');
    const showDot = (status==='trained' || status==='trained-today' || status==='rest' || status==='missed');
    const ds = d.toISOString();
    return `<div class="cal-cell ${cls}" ${clickable?`onclick="openHistoryDay('${ds}')"`:''}>
      <span>${d.getDate()}</span>
      ${showDot ? `<div class="cal-dot"></div>` : ''}
    </div>`;
  }).join('');

  return `<div class="screen">

function shiftHistoryMonth(delta){
  const now = new Date();
  const y = (view.params && view.params.y!=null) ? view.params.y : now.getFullYear();
  const m = (view.params && view.params.m!=null) ? view.params.m : now.getMonth();
  const d = new Date(y, m+delta, 1);
  goTo('history', {y:d.getFullYear(), m:d.getMonth()});
}
function openHistoryDay(iso){
  const d = new Date(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const cmp = new Date(d); cmp.setHours(0,0,0,0);
  if(cmp.getTime()===today.getTime()){ goTo('today'); return; }
  const session = state.sessions.find(s=> new Date(s.endedAt).toDateString()===d.toDateString());
  if(session){ goTo('summary', {sessionId: session.id}); return; }
  goTo('backfill', {date: d.toISOString().slice(0,10)});
}

/* ============ RENDER: DINH DƯỠNG ============ */
function nutritionTotalsForDate(dateStr){
  const entries = (state.nutritionLogs||{})[dateStr] || [];
  let calMin=0,calMax=0,pMin=0,pMax=0,fMin=0,fMax=0,cMin=0,cMax=0;
  const extra = {}; NUTRIENT_KEYS.forEach(k=> extra[k]={min:0,max:0});
  entries.forEach(e=>{
    const item = findFoodItem(e.foodId);
    if(!item) return;
    calMin+=item.per.cal[0]*e.qty; calMax+=item.per.cal[1]*e.qty;
    pMin+=item.per.protein[0]*e.qty; pMax+=item.per.protein[1]*e.qty;
    fMin+=item.per.fat[0]*e.qty; fMax+=item.per.fat[1]*e.qty;
    cMin+=item.per.carb[0]*e.qty; cMax+=item.per.carb[1]*e.qty;
    NUTRIENT_KEYS.forEach(k=>{
      const v = item.per[k];
      if(!v) return;
      extra[k].min += v[0]*e.qty; extra[k].max += v[1]*e.qty;
    });
  });
  const mid=(a,b)=> (a+b)/2;
  const out = {
    calMin:Math.round(calMin), calMax:Math.round(calMax), calMid:Math.round(mid(calMin,calMax)),
    pMin:+pMin.toFixed(1), pMax:+pMax.toFixed(1), pMid:+mid(pMin,pMax).toFixed(1),
    fMin:+fMin.toFixed(1), fMax:+fMax.toFixed(1), fMid:+mid(fMin,fMax).toFixed(1),
    cMin:+cMin.toFixed(1), cMax:+cMax.toFixed(1), cMid:+mid(cMin,cMax).toFixed(1),
    count: entries.length
  };
  NUTRIENT_KEYS.forEach(k=>{
    out[k+'Min'] = +extra[k].min.toFixed(2);
    out[k+'Max'] = +extra[k].max.toFixed(2);
    out[k+'Mid'] = +mid(extra[k].min, extra[k].max).toFixed(2);
  });
  return out;
}
function waterTotalForDate(dateStr){
  const t = nutritionTotalsForDate(dateStr);
  const direct = (state.waterLogs||{})[dateStr] || 0;
  return Math.round(t.waterMid + direct);
}
function nutrientStatus(key, value, targets){
  const target = targets[key];
  if(!target) return {pct:0, color:'var(--text-tertiary)', label:''};
  if(target.type==='max'){
    const pct = Math.min(140, Math.round(value/target.max*100));
    let color = 'var(--recovery-fresh)', label='Ổn';
    if(pct>100){ color='var(--recovery-stimulated)'; label='Vượt mức'; }
    else if(pct>80){ color='var(--recovery-recovering)'; label='Gần mức trần'; }
    return {pct:Math.min(100,pct), overPct:pct, color, label};
  } else {
    const pct = Math.min(140, Math.round(value/target.min*100));
    let color = 'var(--recovery-fresh)', label='Đạt mục tiêu';
    if(pct<50){ color='var(--recovery-stimulated)'; label='Quá thấp'; }
    else if(pct<90){ color='var(--recovery-recovering)'; label='Còn thiếu'; }
    return {pct:Math.min(100,pct), overPct:pct, color, label};
  }
}
function nutrientRowHtml(key, midValue, targets){
  const meta = NUTRIENT_META[key];
  const target = targets[key];
  if(!meta || !target) return '';
  const st = nutrientStatus(key, midValue, targets);
  const targetTxt = target.type==='max' ? `tối đa ${target.max}${target.unit}` : `tối thiểu ${target.min}${target.unit}`;
  return `<div class="nutrient-row">
    <div class="nutrient-icon">${meta.icon}</div>
    <div class="nutrient-info">
      <div class="nutrient-top"><span class="nutrient-name">${meta.label}</span><span class="nutrient-val">${midValue}${target.unit}</span></div>
      <div class="nutrient-track"><div class="nutrient-fill" style="width:${st.pct}%;background:${st.color}"></div></div>
      <div class="nutrient-sub" style="color:${st.color}">${st.label} · ${targetTxt}</div>
    </div>
  </div>`;
}

  const overWarnings = ['sugar','sodium','satFat'].map(k=>{
    if(!t.count) return null;
    const st = nutrientStatus(k, t[k+'Mid'], targets);
    return st.overPct>100 ? `${NUTRIENT_META[k].icon} ${NUTRIENT_META[k].label} đã vượt mức khuyến nghị hôm nay (${t[k+'Mid']}${targets[k].unit} / tối đa ${targets[k].max}${targets[k].unit})` : null;

    <div class="topbar"><div><h1>Dinh dưỡng</h1><div class="sub">${dateStr}</div></div></div>

    <div class="nutri-hero">
      <div class="kcal-num">${t.count? t.calMid : 0} kcal</div>
      <div class="kcal-range">${t.count? `Ước tính khoảng ${t.calMin}–${t.calMax} kcal · Mục tiêu hôm nay ~${calTarget} kcal (${calPct}%)` : `Chưa nạp gì được ghi nhận · Mục tiêu hôm nay ~${calTarget} kcal`}</div>
      <div class="nutri-macro-grid">
        <div class="nutri-macro-tile"><div class="m-n">${t.count? t.pMid : 0}g</div><div class="m-l">Đạm</div><div class="m-r">${t.count? t.pMin+'–'+t.pMax+'g':'—'}</div></div>
        <div class="nutri-macro-tile"><div class="m-n">${t.count? t.fMid : 0}g</div><div class="m-l">Chất béo</div><div class="m-r">${t.count? t.fMin+'–'+t.fMax+'g':'—'}</div></div>
        <div class="nutri-macro-tile"><div class="m-n">${t.count? t.cMid : 0}g</div><div class="m-l">Carb</div><div class="m-r">${t.count? t.cMin+'–'+t.cMax+'g':'—'}</div></div>
      </div>
      <div class="nutri-macro-grid" style="margin-top:8px;">
        <div class="nutri-macro-tile"><div class="m-n">${t.count? t.sugarMid : 0}g</div><div class="m-l">Đường</div></div>
        <div class="nutri-macro-tile"><div class="m-n">${t.count? t.fiberMid : 0}g</div><div class="m-l">Chất xơ</div></div>
        <div class="nutri-macro-tile"><div class="m-n">${waterTotal}ml</div><div class="m-l">Nước</div></div>
      </div>
    </div>

    ${overWarnings.length? `<div class="warn-card">${overWarnings.map(w=>`<div class="warn-line">⚠️ ${w}</div>`).join('')}</div>` : ''}

    <div class="section-label">Nước uống hôm nay</div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;">
          <div style="font-size:20px;font-weight:700;">${waterTotal}ml <span style="font-size:12px;color:var(--text-tertiary);font-weight:500;">/ ${waterTarget}ml mục tiêu</span></div>
          <div class="nutrient-track" style="margin-top:8px;"><div class="nutrient-fill" style="width:${waterPct}%;background:var(--recovery-fresh)"></div></div>
          <div class="nutrient-sub" style="color:var(--text-tertiary);margin-top:4px;">Gồm ${Math.round(t.waterMid)}ml từ món ăn/đồ uống đã ghi + ${waterDirect}ml uống trực tiếp</div>

function promptAddFood(foodId){
  const item = findFoodItem(foodId);
  if(!item) return;
  const val = prompt(`Số lượng (${item.unit}) — ${item.vi}`, item.defaultQty);
  if(val===null) return;
  const qty = parseFloat(val);
  if(isNaN(qty) || qty<=0){ showToast('Số lượng không hợp lệ'); return; }
  const todayStr = new Date().toDateString();
  state.nutritionLogs = state.nutritionLogs || {};
  state.nutritionLogs[todayStr] = state.nutritionLogs[todayStr] || [];
  state.nutritionLogs[todayStr].push({id:'f_'+Date.now(), foodId, qty, addedAt:new Date().toISOString()});
  saveState(); render();
  const calMid = Math.round((item.per.cal[0]+item.per.cal[1])/2*qty);
  showToast(`Đã thêm ${item.vi} · ~${calMid} kcal`);
}
function removeFoodEntry(entryId){
  const todayStr = new Date().toDateString();
  const list = (state.nutritionLogs||{})[todayStr] || [];
  state.nutritionLogs[todayStr] = list.filter(e=>e.id!==entryId);
  saveState(); render();
}
function addWaterQuick(ml){
  const todayStr = new Date().toDateString();
  state.waterLogs = state.waterLogs || {};
  state.waterLogs[todayStr] = (state.waterLogs[todayStr]||0) + ml;
  saveState(); render(); showToast(`Đã thêm ${ml}ml nước`);
}
function addWaterCustom(){
  const val = prompt('Số ml nước đã uống', 300);
  if(val===null) return;
  const ml = parseFloat(val);
  if(isNaN(ml) || ml<=0){ showToast('Số lượng không hợp lệ'); return; }
  addWaterQuick(Math.round(ml));
}
function resetTodayWater(){
  const todayStr = new Date().toDateString();
  state.waterLogs = state.waterLogs || {};
  state.waterLogs[todayStr] = 0;
  saveState(); render();
}

/* ============ RENDER: HOÀN THÀNH BÀI TẬP HÔM QUA (backfill) ============ */
function maxBackfillDateStr(){
  const d = new Date(); d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}
function defaultBackfillDateStr(){ return maxBackfillDateStr(); }
function renderBackfill(){
  const sel = (view.params && view.params.date) || defaultBackfillDateStr();
  const dateObj = new Date(sel+'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const cmpDate = new Date(dateObj); cmpDate.setHours(0,0,0,0);
  const isPast = cmpDate.getTime() < today.getTime();

  const dow = dateObj.getDay();
  const dayKey = DAY_KEYS[dow];
  const template = state.split[dayKey] || 'Rest';
  const fixedRest = isFixedRestDOW(dow);
  const isRestDay = template==='Rest' || fixedRest;
  const dateStrDisplay = dateObj.toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'long'});

  const alreadySession = state.sessions.find(s=> new Date(s.endedAt).toDateString()===dateObj.toDateString());
  const alreadyRestChecked = (state.restCheckins||[]).includes(dateObj.toDateString()) || (state.streakSaveDates||[]).includes(dateObj.toDateString());

  let body;
  if(!isPast){
    body = `<div class="empty"><p>Chỉ áp dụng cho ngày đã qua (trước hôm nay). Chọn ngày khác ở trên.</p></div>`;
  } else if(alreadySession){
    body = `<div class="empty"><p>Ngày này đã có buổi tập được ghi nhận rồi ✔</p></div>
      <button class="ghost-btn" style="margin:0 20px;" onclick="goTo('summary',{sessionId:'${alreadySession.id}'})">Xem lại buổi tập này</button>`;
  } else if(isRestDay){
    if(fixedRest){
      body = `<div class="empty"><p>Đây là ngày nghỉ cố định (Thứ 5/Chủ Nhật) — đã tự động tính vào chuỗi, không cần làm gì thêm.</p></div>`;
    } else if(alreadyRestChecked){
      body = `<div class="empty"><p>Ngày nghỉ này đã được tính vào chuỗi rồi.</p></div>`;
    } else {
      body = `<button class="hero-cta" style="margin:12px 20px;width:calc(100% - 40px);" onclick="backfillRest('${dateObj.toISOString()}')">Tick đã nghỉ ngày này</button>`;
    }
  } else {
    const exs = exercisesForDay(template);
    body = `
      <div class="section-label">Bài tập của ngày này (${template})</div>
      ${exs.map(ex=>`<div class="ex-item" style="cursor:default;"><div class="ex-main"><div class="ex-name">${ex.vi}</div><div class="ex-name-en">${ex.en}</div></div></div>`).join('')}
      <button class="hero-cta" style="margin:12px 20px;width:calc(100% - 40px);" onclick="backfillComplete('${dateObj.toISOString()}','${template}')">✔ Hoàn thành nhanh cả buổi</button>
      <div class="info-block" style="margin:4px 20px;color:var(--text-tertiary);font-size:12px;">Dùng mức tạ/số rep gần nhất đã lưu cho từng bài (nếu có). Buổi tập này sẽ được tính đúng vào ngày đã chọn — hồi phục cơ và chuỗi 🔥 sẽ tự cập nhật lại theo ngày đó.</div>`;
  }

  const wm = measurementForDate(dateObj);
  const sh = sleepHoursForNightOf(dateObj);
  const rec = sleepRecoveryInfo(sh);
  const nutri = nutritionTotalsForDate(dateObj.toDateString());
  const healthCard = (isPast && (wm || sh!=null || nutri.count>0)) ? `
    <div class="card">
      <div class="card-title">Nhật ký sức khỏe ngày này</div>
      <div class="info-block" style="margin:0 0 6px;"><b>Cân nặng:</b> ${wm? wm.weight+'kg' : 'Chưa có dữ liệu'}</div>
      <div class="info-block" style="margin:0 0 ${nutri.count>0?'6px':'0'};"><b>Giờ ngủ đêm đó:</b> ${sh!=null? sh+' tiếng' : 'Chưa có dữ liệu'}${rec? ` <span style="color:${rec.color};font-weight:600;">· ${rec.text}</span>`:''}</div>
      ${nutri.count>0 ? `<div class="info-block" style="margin:0;"><b>Dinh dưỡng:</b> ~${nutri.calMid} kcal (${nutri.calMin}–${nutri.calMax}) · Đạm ${nutri.pMid}g · Béo ${nutri.fMid}g · Carb ${nutri.cMid}g</div>` : ''}
    </div>` : '';

  return `<div class="screen">
    <div class="sheet-header"><div class="back-btn" onclick="goTo('history')">${ICONS.back} Lịch sử tập</div></div>
    <div style="padding:4px 20px;">
      <div style="font-size:22px;font-weight:700;letter-spacing:-0.3px;">Hoàn thành bài tập ngày cũ</div>
      <div style="font-size:13px;color:var(--text-tertiary);margin-top:2px;">Xem lại buổi tập, cân nặng, giấc ngủ của từng ngày — hoặc bù lại ngày quên tick</div>
    </div>
    <div class="card">
      <div class="card-title">Chọn ngày</div>
      <input class="set-input" type="date" id="backfillDateInput" value="${sel}" max="${maxBackfillDateStr()}" onchange="pickBackfillDate(this.value)" style="width:100%;">
      <div class="info-block" style="margin:10px 0 0;"><b>${dateStrDisplay}</b> · ${fixedRest? 'Ngày nghỉ cố định' : template}</div>
    </div>
    ${healthCard}
    ${body}
  </div>`;
}
function pickBackfillDate(val){ if(val) goTo('backfill', {date:val}); }
function backfillRest(iso){
  const d = new Date(iso);
  const key = d.toDateString();
  state.restCheckins = state.restCheckins||[];
  if(!state.restCheckins.includes(key)) state.restCheckins.push(key);
  saveState(); render();
  showToast('Đã tick ngày nghỉ cho '+d.toLocaleDateString('vi-VN'));
}
function backfillComplete(iso, template){
  const d = new Date(iso);
  if(state.sessions.some(s=> new Date(s.endedAt).toDateString()===d.toDateString())){
    showToast('Ngày này đã có buổi tập'); render(); return;
  }
  const exs = exercisesForDay(template);
  const sets = exs.map(ex=>{
    const prog = state.exerciseProgress[ex.id];
    return {exerciseId: ex.id, weight: prog? prog.weight : null, reps: prog? prog.reps : null, sets: ex.sets, completedAt: iso};
  });
  const session = {id:'s_'+Date.now(), dayLabel: template, startedAt: iso, endedAt: iso, sets, backfilled: true};
  state.sessions.push(session);
  saveState();
  showToast('Đã hoàn thành buổi tập ngày trước ✔ — chuỗi & hồi phục đã cập nhật lại');
  goTo('summary', {sessionId: session.id});
}

/* ============ WEEKLY INSIGHT (kiểm tra lại mỗi tuần) ============
   Dựa trên 7 ngày gần nhất: lượng calo nạp trung bình so với mục tiêu (TDEE + thặng dư lean-gain),
   xu hướng cân nặng, và các vi chất bị vượt/thiếu trung bình -> đưa ra 1 thẻ nhận xét nhẹ nhàng
   (không phải popup) kèm gợi ý (giữ nguyên / giảm nhẹ khẩu phần / tăng nhẹ khẩu phần) và cảnh báo. */
function last7DateStrings(){
  const arr = [];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); arr.push(d.toDateString()); }
  return arr;
}
function computeWeeklyInsight(){
  if(!state.profile) return null;
  const days = last7DateStrings();
  const targets = nutrientTargets();
  const loggedDays = days.filter(d=> ((state.nutritionLogs||{})[d]||[]).length>0);
  if(loggedDays.length < 3) return null; // chưa đủ dữ liệu để đánh giá đáng tin cậy

  let calSum=0, sodiumSum=0, sugarSum=0, satFatSum=0, fiberSum=0;
  loggedDays.forEach(d=>{
    const t = nutritionTotalsForDate(d);
    calSum += t.calMid; sodiumSum += t.sodiumMid; sugarSum += t.sugarMid; satFatSum += t.satFatMid; fiberSum += t.fiberMid;
  });
  const n = loggedDays.length;
  const calAvg = Math.round(calSum/n);
  const sodiumAvg = Math.round(sodiumSum/n);
  const sugarAvg = Math.round(sugarSum/n);
  const satFatAvg = Math.round(satFatSum/n);
  const fiberAvg = Math.round(fiberSum/n);

  const tdee = tdeeToday();
  const targetCal = dailyCalorieTarget();
  const diffAvg = calAvg - tdee; // dương = đang ăn dư so với mức duy trì cân nặng

  // Xu hướng cân nặng: so đo gần nhất trong 7 ngày với đo gần nhất trước đó (nếu có đủ)
  const sortedM = [...state.measurements].sort((a,b)=> new Date(a.date)-new Date(b.date));
  let weightDelta = null;
  if(sortedM.length>=2){
    const latest = sortedM[sortedM.length-1];
    const weekAgoTarget = new Date(latest.date); weekAgoTarget.setDate(weekAgoTarget.getDate()-7);
    let ref = sortedM[0];
    for(const m of sortedM){ if(new Date(m.date) <= weekAgoTarget) ref = m; }
    if(new Date(ref.date) < new Date(latest.date)) weightDelta = +(latest.weight - ref.weight).toFixed(1);
  }

  const warnings = [];
  if(sodiumAvg > targets.sodium.max) warnings.push(`Natri trung bình ${sodiumAvg}mg/ngày — vượt mức khuyến nghị ${targets.sodium.max}mg. Nên giảm bớt món mặn/chấm.`);
  if(satFatAvg > targets.satFat.max) warnings.push(`Chất béo bão hoà trung bình ${satFatAvg}g/ngày — vượt mức khuyến nghị ${targets.satFat.max}g. Cân nhắc giảm đồ chiên/mỡ động vật.`);
  if(sugarAvg > targets.sugar.max) warnings.push(`Đường trung bình ${sugarAvg}g/ngày — vượt mức khuyến nghị ${targets.sugar.max}g. Đồ uống có đường/sinh tố là nguồn chính cần để ý.`);
  if(fiberAvg < targets.fiber.min*0.7) warnings.push(`Chất xơ trung bình chỉ ${fiberAvg}g/ngày — khá thấp so với mục tiêu ${targets.fiber.min}g. Nên ăn thêm rau củ.`);

  // Xu hướng & khuyến nghị tổng thể — luôn hướng theo mục tiêu lean gain, tránh bulk thô
  let tendency, recommendation, tag, tagColor;
  const surplusTarget = goalDailySurplus();
  if(diffAvg > surplusTarget + 250 || (weightDelta!=null && weightDelta > 0.5)){
    tendency = 'gain_fast';
    tag = 'Đang tăng cân khá nhanh'; tagColor = 'var(--recovery-recovering)';
    recommendation = `Theo đà ăn uống & nghỉ ngơi tuần qua, cơ thể bạn đang có xu hướng dễ tăng cân hơn mức cần cho một lean-gain đều đặn (đang dư khoảng ${Math.max(0,diffAvg)} kcal/ngày so với mức duy trì). Nếu muốn giữ dáng slimfit thay vì to thô, nên giảm nhẹ khẩu phần tinh bột/chất béo mỗi bữa một chút, giữ đạm cao, và ưu tiên thêm rau/chất xơ.`;
  } else if(diffAvg < surplusTarget - 250 || (weightDelta!=null && weightDelta < -0.3)){
    tendency = 'under';
    tag = 'Đang ăn thiếu so với mục tiêu'; tagColor = 'var(--recovery-stimulated)';
    recommendation = `Lượng calo nạp trung bình đang thấp hơn mức cần để tăng cân đều đặn theo mục tiêu ${state.profile.goalWeight||75}kg. Nên bổ sung thêm 1 bữa phụ giàu đạm & tinh bột tốt (cơm, chuối, sữa) mỗi ngày để không bị hụt cân hoặc mất cơ.`;
  } else {
    tendency = 'on_track';
    tag = 'Đang đúng hướng — lean gain'; tagColor = 'var(--recovery-fresh)';
    recommendation = `Nhịp ăn uống 7 ngày qua khá cân bằng với mục tiêu tăng cân từ từ, giữ thân hình slimfit thay vì bulk thô. Cứ duy trì đạm cao, kiểm soát nhẹ tinh bột/chất béo như hiện tại.`;
  }

  const result = {
    computedAt: new Date().toISOString(),
    calAvg, tdee, targetCal, diffAvg, weightDelta, sodiumAvg, sugarAvg, satFatAvg, fiberAvg,
    tendency, recommendation, tag, tagColor, warnings, daysUsed:n
  };
  return result;
}
function maybeRefreshWeeklyInsight(){
  if(!state.profile) return;
  const wi = state.weeklyInsight;
  const needsRefresh = !wi || (new Date() - new Date(wi.computedAt)) >= 7*86400000;
  if(!needsRefresh) return;
  const fresh = computeWeeklyInsight();
  if(fresh){ state.weeklyInsight = fresh; saveState(); }
}
function renderWeeklyInsightCard(){
  const wi = state.weeklyInsight;
  if(!wi) return '';
  const dateTxt = new Date(wi.computedAt).toLocaleDateString('vi-VN',{day:'numeric', month:'numeric'});
  return `<div class="insight-card">
    <div class="insight-eyebrow">🗓️ Đánh giá hàng tuần · cập nhật ${dateTxt}</div>
    <div class="insight-title">${wi.tag}</div>
    <div class="insight-body">${wi.recommendation}</div>
    ${wi.warnings.length? `<div style="margin-top:10px;">${wi.warnings.map(w=>`<div class="warn-line">⚠️ ${w}</div>`).join('')}</div>` : ''}
    <div class="insight-tag" style="background:${wi.tagColor}22;color:${wi.tagColor};">~${wi.calAvg} kcal/ngày trung bình · mục tiêu ~${wi.targetCal} kcal</div>
  </div>`;
}

function render(){
  const el = document.getElementById('app');
  maybeRefreshWeeklyInsight();
  if(!state.profile){
    document.getElementById('navbar').innerHTML = '';
    el.innerHTML = renderOnboarding();
    return;
  }
  renderNavbar();
  if(view.name==='home') el.innerHTML = renderHome();
  else if(view.name==='today') el.innerHTML = renderToday();
  else if(view.name==='pickOption') el.innerHTML = renderPickOption(view.params.id);
  else if(view.name==='exerciseInfo') el.innerHTML = renderExerciseInfo(view.params.id);
  else if(view.name==='summary') el.innerHTML = renderSummary(view.params.sessionId);
  else if(view.name==='library') el.innerHTML = renderLibrary();
  else if(view.name==='recovery') el.innerHTML = renderRecovery();
  else if(view.name==='settings') el.innerHTML = renderSettings();
  else if(view.name==='backfill') el.innerHTML = renderBackfill();
  else if(view.name==='history') el.innerHTML = renderHistory();
  else if(view.name==='nutrition') el.innerHTML = renderNutrition();
  else if(view.name==='chooseFinisher') el.innerHTML = renderChooseFinisher();
}

/* ============ LIVE TIMER TICK ============
   Cập nhật đồng hồ mỗi giây bằng cách sửa trực tiếp nội dung DOM (không render lại cả trang)
   để tránh giật/mất focus khi đang xem màn hình Hôm nay lúc buổi tập đang chạy. */
setInterval(()=>{
  const el = document.getElementById('liveTimerText');
  if(el && state.activeSession && state.activeSession.running){
    el.textContent = formatElapsed(currentElapsedMs());
  }
}, 1000);

/* ============ INIT ============ */
(async function init(){
  await loadState();
  render();
})();
</script>
